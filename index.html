<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Python Academy Studio</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #161b22; padding: 15px 25px; border-bottom: 2px solid #238636; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Левая панель - Дизайн карточек */
        .sidebar { width: 420px; background: #0d1117; border-right: 1px solid #30363d; overflow-y: auto; padding: 20px; }
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        .nav-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 15px; transition: all 0.2s ease; }
        .nav-card:hover { border-color: #238636; background: #1c2128; transform: translateX(5px); }
        
        .nav-header { display: flex; align-items: center; margin-bottom: 12px; font-size: 16px; font-weight: 600; color: #58a6ff; }
        .nav-header span { margin-right: 10px; font-size: 20px; }

        .btn-group { display: flex; gap: 10px; }
        .btn-nav { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .btn-help { background: #30363d; color: #c9d1d9; }
        .btn-help:hover { background: #8b949e; color: #0d1117; }
        
        .btn-code { background: #238636; color: #ffffff; }
        .btn-code:hover { background: #2ea043; }

        /* Редактор и Консоль */
        .editor-section { flex: 1; display: flex; flex-direction: column; padding: 20px; background: #0d1117; }
        #code-input { flex: 1; background: #010409; color: #d7dae0; font-family: 'Fira Code', 'Consolas', monospace; padding: 20px; border: 1px solid #30363d; border-radius: 12px; font-size: 16px; resize: none; outline: none; line-height: 1.6; }
        
        .action-bar { display: flex; gap: 12px; margin-top: 15px; }
        #run-btn { flex: 3; background: #238636; color: white; border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .btn-secondary { flex: 1; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px; cursor: pointer; }

        #output { height: 200px; background: #010409; color: #39d353; padding: 15px; font-family: monospace; border-radius: 12px; border: 1px solid #30363d; margin-top: 15px; overflow-y: auto; white-space: pre-wrap; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }

        /* Всплывающее окно */
        #modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); }
        .modal-box { background: #161b22; margin: 8% auto; padding: 35px; width: 65%; max-width: 700px; border-radius: 16px; border-top: 5px solid #58a6ff; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #8b949e; }
        
        .info-section { margin-bottom: 18px; }
        .info-tag { color: #58a6ff; font-weight: bold; text-transform: uppercase; font-size: 12px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="m-title" style="margin-top:0; color:#58a6ff"></h2>
        <div id="m-body" style="font-size: 16px; line-height: 1.8; color: #c9d1d9;"></div>
    </div>
</div>

<header>
    <h2 style="margin:0; font-size: 18px; letter-spacing: 1px;">🐍 PYTHON ACADEMY</h2>
    <div id="status" style="font-size: 12px; color: #8b949e;">Все изменения сохранены</div>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="nav-card">
            <div class="nav-header"><span>📣</span> Вывод текста</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('print')">Инфо ?</button>
                <button class="btn-nav btn-code" onclick="addCode('print(\'Привет, мир!\')\nprint(123)')">Пример <></button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span>📦</span> Переменные</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('vars')">Инфо ?</button>
                <button class="btn-nav btn-code" onclick="addCode('name = \"Герой\"\nhp = 100\nprint(f\"{name} имеет {hp} здоровья\")')">Пример <></button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span>🛤</span> Условия</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('if')">Инфо ?</button>
                <button class="btn-nav btn-code" onclick="addCode('score = 50\nif score >= 50:\n    print(\"Победа!\")\nelse:\n    print(\"Проигрыш\")')">Пример <></button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span>📚</span> Списки</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('lists')">Инфо ?</button>
                <button class="btn-nav btn-code" onclick="addCode('items = [\"Яблоко\", \"Банан\"]\nitems.append(\"Груша\")\nprint(items[0])')">Пример <></button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span>🔄</span> Циклы</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('loops')">Инфо ?</button>
                <button class="btn-nav btn-code" onclick="addCode('for i in range(3):\n    print(f\"Повтор №{i+1}\")')">Пример <></button>
            </div>
        </div>

        <button class="btn-secondary" style="width:100%; margin-top:20px; color:#f85149; border-color:#f85149;" onclick="clearEditor()">Очистить всё</button>
    </div>

    <div class="editor-section">
        <textarea id="code-input" oninput="save()" placeholder="Выбери пример слева или начни писать код..."></textarea>
        <div class="action-bar">
            <button id="run-btn" py-click="run">ЗАПУСТИТЬ КОД</button>
            <button class="btn-secondary" onclick="download()">СКАЧАТЬ .PY</button>
        </div>
        <div id="output">Консоль готова...</div>
    </div>
</div>

<script>
    const explanations = {
        print: {
            title: "📣 Вывод данных (print)",
            body: `<span class="info-tag">Простыми словами:</span> Это способ программы "заговорить". Всё, что ты положишь внутрь скобок, появится в черном окне внизу.
                   <br><br><span class="info-tag">Зачем это нужно:</span> Чтобы видеть результат расчетов или проверять, как работает код.
                   <br><br><span class="info-tag">Главная ловушка:</span> Если хочешь вывести текст — ставь кавычки. Если число — кавычки не нужны.`
        },
        vars: {
            title: "📦 Переменные (Ячейки памяти)",
            body: `<span class="info-tag">Простыми словами:</span> Представь коробку, на которой написано имя (например, 'x'). Ты кладешь внутрь данные. Теперь везде, где ты напишешь 'x', Python будет видеть то, что лежит в коробке.
                   <br><br><span class="info-tag">Зачем это нужно:</span> Чтобы компьютер мог запоминать имя игрока, счет в игре или сложные вычисления.
                   <br><br><span class="info-tag">Важно:</span> Имя переменной должно быть без пробелов и не начинаться с цифры.`
        },
        if: {
            title: "🛤 Условия (Выбор пути)",
            body: `<span class="info-tag">Простыми словами:</span> Это развилка. Если условие верно — выполняется один код, если нет — другой. Прямо как в жизни: "Если идет дождь — возьми зонт".
                   <br><br><span class="info-tag">Синтаксис:</span> После условия всегда ставится двоеточие <code>:</code>. 
                   <br><br><span class="info-tag">Главная ловушка:</span> Код внутри условия ОБЯЗАТЕЛЬНО должен иметь отступ (4 пробела). Без них Python не поймет, что к чему относится.`
        },
        lists: {
            title: "📚 Списки (Коллекции)",
            body: `<span class="info-tag">Простыми словами:</span> Это длинная коробка с пронумерованными отсеками. В одном списке можно хранить сразу много вещей.
                   <br><br><span class="info-tag">Нумерация:</span> Программисты хитрые — они начинают считать с <b>0</b>. Первый предмет в списке — это [0], второй — [1].
                   <br><br><span class="info-tag">Действие:</span> Команда <code>.append()</code> добавляет новый предмет в самый конец списка.`
        },
        loops: {
            title: "🔄 Циклы (Повторения)",
            body: `<span class="info-tag">Простыми словами:</span> Заставляет компьютер делать одно и то же действие много раз. Это экономит твое время.
                   <br><br><span class="info-tag">range(3):</span> Создает очередь из трех чисел (0, 1, 2). Цикл пройдет по ним по порядку.
                   <br><br><span class="info-tag">Зачем это нужно:</span> Например, чтобы вывести 100 сообщений или проверить 1000 цен в интернет-магазине.`
        }
    };

    function openHelp(key) {
        document.getElementById('m-title').innerHTML = explanations[key].title;
        document.getElementById('m-body').innerHTML = explanations[key].body;
        document.getElementById('modal').style.display = "block";
    }

    function closeModal() { document.getElementById('modal').style.display = "none"; }
    
    function addCode(code) {
        const input = document.getElementById('code-input');
        input.value += (input.value ? "\n\n" : "") + code;
        save();
    }

    function save() {
        localStorage.setItem('py_studio_v2', document.getElementById('code-input').value);
        document.getElementById('status').innerText = "Изменено: " + new Date().toLocaleTimeString();
    }

    function clearEditor() { if(confirm("Удалить весь код?")) { document.getElementById('code-input').value = ""; save(); } }

    function download() {
        const blob = new Blob([document.getElementById('code-input').value], { type: 'text/plain' });
        const a = document.createElement('a');
        a.download = "my_code.py";
        a.href = URL.createObjectURL(blob);
        a.click();
    }

    window.onload = () => {
        const saved = localStorage.getItem('py_studio_v2');
        if(saved) document.getElementById('code-input').value = saved;
    }
</script>

<script type="py">
    import sys
    from js import document
    def run(event):
        out = document.getElementById("output")
        out.innerText = ">>> Выполнение...\n"
        code = document.getElementById("code-input").value
        class Writer:
            def write(self, t): out.innerText += t
            def flush(self): pass
        sys.stdout = Writer()
        try: exec(code)
        except Exception as e: out.innerText += f"\n[!] ОШИБКА: {e}"
</script>
</body>
</html>
