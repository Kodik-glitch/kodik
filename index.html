<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Python Academy Pro</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 🛑 СКРЫТИЕ СТАНДАРТНОГО ТЕРМИНАЛА PYSCRIPT 🛑 */
        py-terminal, .py-terminal, py-config, .py-overlay, py-splashscreen, 
        section[class*="pyscript"], div[class*="pyscript"] { 
            display: none !important; 
            visibility: hidden !important; 
            opacity: 0 !important; 
            height: 0 !important; 
        }

        header { background: #161b22; padding: 15px 25px; border-bottom: 2px solid #238636; display: flex; justify-content: space-between; align-items: center; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Левая панель */
        .sidebar { width: 400px; background: #0d1117; border-right: 1px solid #30363d; overflow-y: auto; padding: 20px; }
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        .nav-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .nav-header { display: flex; align-items: center; font-weight: 600; color: #58a6ff; font-size: 15px; }
        .nav-keywords { display: block; font-size: 11px; color: #8b949e; margin: 4px 0 10px 28px; font-family: 'Consolas', monospace; }

        .btn-group { display: flex; gap: 8px; }
        .btn-nav { border: none; border-radius: 6px; cursor: pointer; font-weight: bold; height: 34px; transition: 0.2s; }
        .btn-help { width: 36px; background: #30363d; color: #c9d1d9; font-size: 18px; }
        .btn-help:hover { background: #58a6ff; color: white; }
        .btn-code { flex: 1; background: #238636; color: white; font-size: 11px; text-transform: uppercase; }
        .btn-code:hover { background: #2ea043; }

        /* Редактор */
        .editor-section { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        .CodeMirror { flex: 1; border-radius: 12px; font-size: 16px; border: 1px solid #30363d !important; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .action-bar { display: flex; gap: 10px; margin-top: 15px; }
        #run-btn { flex: 3; background: #238636; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .btn-sec { flex: 1; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px; cursor: pointer; }

        #output { height: 180px; background: #010409; color: #39d353; padding: 15px; font-family: 'Consolas', monospace; border-radius: 12px; border: 1px solid #30363d; margin-top: 15px; overflow-y: auto; white-space: pre-wrap; font-size: 14px; }

        /* Модалка */
        #modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        .modal-box { background: #161b22; margin: 8% auto; padding: 30px; width: 60%; max-width: 700px; border-radius: 16px; border-left: 5px solid #58a6ff; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #8b949e; }
        .tag { color: #58a6ff; font-weight: bold; font-size: 12px; display: block; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="m-title" style="margin-top:0; color:#58a6ff; font-size: 22px;"></h2>
        <div id="m-body" style="font-size: 16px; line-height: 1.7; color: #d1d5db;"></div>
    </div>
</div>

<header>
    <h2 style="margin:0; font-size: 18px;">🐍 Python Academy Pro</h2>
    <div id="status" style="font-size: 12px; color: #8b949e;">Система готова</div>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="nav-card">
            <div class="nav-header"><span>📣</span> Вывод данных</div>
            <span class="nav-keywords">print(), f"", \n</span>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('print')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('print(f\"Результат: {10 + 5}\")')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span>📦</span> Переменные</div>
            <span class="nav-keywords">name = value, int, str</span>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('vars')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('user = \"Admin\"\nlevel = 5\nprint(user, level)')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span>🛤</span> Условия</div>
            <span class="nav-keywords">if, elif, else, ==, !=</span>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('if')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('score = 80\nif score >= 50:\n    print(\"Успех!\")\nelse:\n    print(\"Попробуй снова\")')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span>🔄</span> Циклы</div>
            <span class="nav-keywords">for i in range(), while</span>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('loops')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('for i in range(3):\n    print(f\"Повтор №{i+1}\")')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span>📚</span> Списки</div>
            <span class="nav-keywords">[], .append(), len()</span>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('lists')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('items = [\"Яблоко\", \"Банан\"]\nitems.append(\"Груша\")\nprint(items[0])')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span>📖</span> Словари</div>
            <span class="nav-keywords">{key: value}, .get()</span>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('dicts')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('hero = {\"имя\": \"Рыцарь\", \"hp\": 100}\nprint(hero[\"имя\"])')">Пример</button>
            </div>
        </div>

        <button class="btn-sec" style="width:100%; margin-top:20px; color:#f85149;" onclick="clearAll()">Очистить всё</button>
    </div>

    <div class="editor-section">
        <textarea id="code-input"></textarea>
        <div class="action-bar">
            <button id="run-btn" py-click="run">ЗАПУСТИТЬ КОД</button>
            <button class="btn-sec" onclick="download()">СКАЧАТЬ .PY</button>
        </div>
        <div id="output">Результат...</div>
    </div>
</div>

<script>
    const editor = CodeMirror.fromTextArea(document.getElementById("code-input"), {
        mode: "python", theme: "dracula", lineNumbers: true, indentUnit: 4, matchBrackets: true, autoCloseBrackets: true
    });

    const explanations = {
        print: { 
            title: "📣 Вывод данных (print)", 
            body: "<span class='tag'>Простыми словами:</span> Эта команда говорит компьютеру «покажи мне это на экране».<br><br><b>Важно:</b> Текст всегда пишется в кавычках <code>\"...\"</code>, а расчеты или переменные — без кавычек.<br><br><b>Лайфхак:</b> Используй букву <b>f</b> перед кавычками, чтобы вставлять переменные прямо в текст: <code>f\"Привет, {name}\"</code>." 
        },
        vars: { 
            title: "📦 Переменные", 
            body: "<span class='tag'>Простыми словами:</span> Это коробка с именем, в которую можно положить данные (число или текст).<br><br><b>Как это работает:</b> Слева пишем имя, потом знак <code>=</code>, а справа — значение. <br><br><b>Пример:</b> <code>hp = 100</code>. Теперь компьютер знает, что в «hp» лежит число 100." 
        },
        if: { 
            title: "🛤 Условия (if/else)", 
            body: "<span class='tag'>Простыми словами:</span> Это развилка на дороге. «Если условие верно — иди направо, иначе — иди налево».<br><br><b>Важно:</b> В конце строки с <code>if</code> всегда ставится двоеточие <b>:</b>, а следующая строка обязательно пишется с отступом (4 пробела)." 
        },
        loops: { 
            title: "🔄 Циклы (for)", 
            body: "<span class='tag'>Простыми словами:</span> Заставляет компьютер повторять одно и то же действие много раз.<br><br><b>Пример:</b> <code>range(5)</code> заставит код сработать 5 раз. Очень полезно для обработки длинных списков данных." 
        },
        lists: { 
            title: "📚 Списки", 
            body: "<span class='tag'>Простыми словами:</span> Это длинный ящик с пронумерованными отсеками. В него можно сложить много вещей сразу.<br><br><b>Помни:</b> Нумерация в программировании начинается с <b>0</b>. Первый элемент — это <code>[0]</code>, второй — <code>[1]</code>." 
        },
        dicts: { 
            title: "📖 Словари", 
            body: "<span class='tag'>Простыми словами:</span> Похоже на список, но у каждого значения есть свое уникальное «имя» (ключ).<br><br><b>Пример:</b> В словаре персонажа ключ <code>\"сила\"</code> может иметь значение <code>10</code>." 
        }
    };

    function openHelp(k) {
        document.getElementById('m-title').innerText = explanations[k].title;
        document.getElementById('m-body').innerHTML = explanations[k].body;
        document.getElementById('modal').style.display = "block";
    }

    function closeModal() { document.getElementById('modal').style.display = "none"; }
    function addCode(c) {
        const current = editor.getValue();
        editor.setValue(current + (current ? "\n\n" : "") + c);
    }
    function clearAll() { if(confirm("Очистить редактор?")) editor.setValue(""); }
    function download() {
        const blob = new Blob([editor.getValue()], { type: 'text/plain' });
        const a = document.createElement('a');
        a.download = "script.py";
        a.href = URL.createObjectURL(blob);
        a.click();
    }

    editor.on("change", () => localStorage.setItem('py_editor_pro', editor.getValue()));
    window.onload = () => {
        const saved = localStorage.getItem('py_editor_pro');
        if(saved) editor.setValue(saved);
    };
</script>

<script type="py">
    import sys
    from js import document, editor
    
    def run(event):
        out = document.getElementById("output")
        out.innerText = ">>> Запуск...\n"
        code = editor.getValue()
        
        class Writer:
            def write(self, t): out.innerText += t
            def flush(self): pass
        sys.stdout = Writer()
        try: exec(code)
        except Exception as e: out.innerText += f"\nОшибка: {e}"
</script>
</body>
</html>
