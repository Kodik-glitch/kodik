<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Python Academy Studio Pro</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #161b22; padding: 15px 25px; border-bottom: 2px solid #238636; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Левая панель */
        .sidebar { width: 380px; background: #0d1117; border-right: 1px solid #30363d; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        .nav-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 12px; transition: all 0.2s ease; }
        .nav-card:hover { border-color: #238636; background: #1c2128; }
        
        .nav-header { display: flex; align-items: center; margin-bottom: 10px; font-size: 15px; font-weight: 600; }
        .nav-header span { margin-right: 12px; font-size: 18px; width: 24px; text-align: center; }

        .btn-group { display: flex; gap: 8px; }
        .btn-nav { border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center; height: 32px; }
        
        .btn-help { width: 32px; background: #30363d; color: #c9d1d9; font-size: 15px; }
        .btn-help:hover { background: #8b949e; color: #0d1117; }
        
        .btn-code { flex: 1; background: #238636; color: #ffffff; }
        .btn-code:hover { background: #2ea043; }

        /* Редактор */
        .editor-section { flex: 1; display: flex; flex-direction: column; padding: 20px; background: #0d1117; }
        #code-input { flex: 1; background: #010409; color: #d7dae0; font-family: 'Fira Code', monospace; padding: 20px; border: 1px solid #30363d; border-radius: 12px; font-size: 16px; resize: none; outline: none; line-height: 1.6; }
        
        .action-bar { display: flex; gap: 12px; margin-top: 15px; }
        #run-btn { flex: 3; background: #238636; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-secondary { flex: 1; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px; cursor: pointer; }

        #output { height: 180px; background: #010409; color: #7ee787; padding: 15px; font-family: monospace; border-radius: 12px; border: 1px solid #30363d; margin-top: 15px; overflow-y: auto; white-space: pre-wrap; }

        /* Модальное окно */
        #modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .modal-box { background: #161b22; margin: 5% auto; padding: 25px; width: 90%; max-width: 500px; border-radius: 16px; border-top: 4px solid #58a6ff; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #8b949e; }
        
        /* Стили для кода внутри модалки */
        .example-block { background: #010409; padding: 15px; border-radius: 8px; border: 1px solid #30363d; margin-top: 15px; position: relative; }
        .example-code { color: #d7dae0; font-family: monospace; white-space: pre; font-size: 14px; display: block; overflow-x: auto; }
        .copy-btn { position: absolute; right: 10px; top: 10px; background: #238636; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .copy-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="m-title" style="margin-top:0; color:#58a6ff; font-size: 20px;"></h2>
        <div id="m-body" style="font-size: 14px; color: #c9d1d9;"></div>
        
        <div class="example-block">
            <button class="copy-btn" onclick="copyExample()">Копировать</button>
            <div id="m-code" class="example-code"></div>
        </div>
    </div>
</div>

<header>
    <h2 style="margin:0; font-size: 18px;">🐍 PYTHON ACADEMY</h2>
    <div id="status" style="font-size: 12px; color: #8b949e;">Готов к работе</div>
</header>

<div class="main-container">
    <div class="sidebar">
        <script>
            const commands = [
                { id: 'print', icon: '📣', title: 'Вывод текста', color: '#ffca28', code: 'print("Привет!")' },
                { id: 'vars', icon: '📦', title: 'Переменные', color: '#4fc3f7', code: 'name = "Python"\nprint(name)' },
                { id: 'math', icon: '🧮', title: 'Математика', color: '#ff7043', code: 'x = 10 + 5\nprint(x)' },
                { id: 'if', icon: '🛤', title: 'Условия (if)', color: '#ba68c8', code: 'x = 10\nif x > 5:\n    print("Больше")' },
                { id: 'lists', icon: '📚', title: 'Списки', color: '#81c784', code: 'my_list = [1, 2, 3]\nprint(my_list)' },
                { id: 'dicts', icon: '📖', title: 'Словари', color: '#fff176', code: 'user = {"id": 1}\nprint(user)' },
                { id: 'for', icon: '🔄', title: 'Цикл For', color: '#4db6ac', code: 'for i in range(3):\n    print(i)' },
                { id: 'while', icon: '🔁', title: 'Цикл While', color: '#fb8c00', code: 'i = 0\nwhile i < 3:\n    print(i)\n    i += 1' },
                { id: 'funcs', icon: '⚙️', title: 'Функции', color: '#f06292', code: 'def hello():\n    print("Hi!")\n\nhello()' },
                { id: 'errors', icon: '⚠️', title: 'Ошибки', color: '#e57373', code: 'try:\n    1/0\nexcept:\n    print("Ошибка!")' }
            ];

            // Генерация карточек
            document.write(commands.map(cmd => `
                <div class="nav-card">
                    <div class="nav-header"><span style="color: ${cmd.color}">${cmd.icon}</span> ${cmd.title}</div>
                    <div class="btn-group">
                        <button class="btn-nav btn-help" onclick="openHelp('${cmd.id}')">?</button>
                        <button class="btn-nav btn-code" onclick="addCode('${cmd.code.replace(/\n/g, '\\n')}')">Пример</button>
                    </div>
                </div>
            `).join(''));
        </script>
        
        <button class="btn-secondary" style="width:100%; margin-top:10px; color:#f85149; padding: 10px;" onclick="clearEditor()">Очистить всё</button>
    </div>

    <div class="editor-section">
        <textarea id="code-input" spellcheck="false" oninput="save()" placeholder="Напиши код здесь..."></textarea>
        <div class="action-bar">
            <button id="run-btn" py-click="run">ЗАПУСТИТЬ КОД ▶</button>
            <button class="btn-secondary" onclick="download()">СКАЧАТЬ .PY</button>
        </div>
        <div id="output">Результат появится здесь...</div>
    </div>
</div>

<script>
    const explanations = {
        print: { title: "Вывод данных", desc: "Функция print() выводит текст или результат вычислений на экран.", code: 'print("Hello World")' },
        vars: { title: "Переменные", desc: "Переменные хранят данные. Название пишется слева, значение — справа от знака равно.", code: 'score = 100\nname = "Игрок"\nprint(name, score)' },
        math: { title: "Математика", desc: "Python умеет считать: + (плюс), - (минус), * (умножение), / (деление), % (остаток).", code: 'a = 10\nb = 3\nprint(a + b) # 13\nprint(a % b) # 1 (остаток)' },
        if: { title: "Условия", desc: "Позволяет выполнять код только при соблюдении условия. Важен отступ в 4 пробела!", code: 'age = 18\nif age >= 18:\n    print("Доступ разрешен")\nelse:\n    print("Рано еще")' },
        lists: { title: "Списки", desc: "Список — это коллекция элементов. Нумерация начинается с 0.", code: 'items = ["меч", "щит"]\nitems.append("зелье")\nprint(items[0])' },
        dicts: { title: "Словари", desc: "Хранят данные в парах Ключ: Значение.", code: 'player = {"hp": 100, "mp": 50}\nprint(player["hp"])' },
        for: { title: "Цикл For", desc: "Используется для перебора списков или выполнения кода N раз.", code: 'for i in range(5):\n    print(f"Шаг {i}")' },
        while: { title: "Цикл While", desc: "Повторяет код, пока условие истинно.", code: 'hp = 3\nwhile hp > 0:\n    print("Живой")\n    hp -= 1' },
        funcs: { title: "Функции", desc: "Блок кода, который можно вызывать много раз.", code: 'def square(n):\n    return n * n\n\nprint(square(4))' },
        errors: { title: "Обработка ошибок", desc: "Конструкция try/except предотвращает вылет программы при ошибке.", code: 'try:\n    number = int("строка")\nexcept:\n    print("Это не число!")' }
    };

    let currentExample = "";

    function openHelp(key) {
        const info = explanations[key];
        document.getElementById('m-title').innerText = info.title;
        document.getElementById('m-body').innerText = info.desc;
        document.getElementById('m-code').innerText = info.code;
        currentExample = info.code;
        document.getElementById('modal').style.display = "block";
    }

    function closeModal() { document.getElementById('modal').style.display = "none"; }
    
    function copyExample() {
        navigator.clipboard.writeText(currentExample);
        const btn = document.querySelector('.copy-btn');
        btn.innerText = "Скопировано!";
        btn.style.background = "#58a6ff";
        setTimeout(() => { 
            btn.innerText = "Копировать"; 
            btn.style.background = "#238636";
        }, 2000);
    }

    function addCode(code) {
        const input = document.getElementById('code-input');
        input.value += (input.value ? "\n\n" : "") + code;
        save();
    }

    function save() { localStorage.setItem('py_studio_final', document.getElementById('code-input').value); }
    function clearEditor() { if(confirm("Очистить всё?")) { document.getElementById('code-input').value = ""; save(); } }
    
    function download() {
        const blob = new Blob([document.getElementById('code-input').value], { type: 'text/plain' });
        const a = document.createElement('a');
        a.download = "code.py";
        a.href = URL.createObjectURL(blob);
        a.click();
    }

    window.onload = () => {
        const saved = localStorage.getItem('py_studio_final');
        if(saved) document.getElementById('code-input').value = saved;
    }
</script>

<script type="py">
    import sys
    import io
    from js import document

    def run(event):
        out_div = document.getElementById("output")
        code = document.getElementById("code-input").value
        out_div.innerText = ""
        
        output_buffer = io.StringIO()
        sys.stdout = output_buffer
        sys.stderr = output_buffer
        
        try:
            exec(code)
            result = output_buffer.getvalue()
            out_div.innerText = result if result else "Код выполнен без ошибок."
        except Exception as e:
            out_div.innerText = f"❌ ОШИБКА:\n{str(e)}"
        finally:
            sys.stdout = sys.__stdout__
            sys.stderr = sys.__stderr__
</script>
</body>
</html>
