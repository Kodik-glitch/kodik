<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Python Academy Studio Pro</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Скрываем стандартный терминал PyScript */
        py-terminal, py-config, .py-overlay { display: none !important; }

        header { background: #161b22; padding: 15px 25px; border-bottom: 2px solid #238636; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Левая панель */
        .sidebar { width: 380px; background: #0d1117; border-right: 1px solid #30363d; overflow-y: auto; padding: 20px; }
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        .nav-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 15px; transition: all 0.2s ease; }
        .nav-card:hover { border-color: #238636; background: #1c2128; }
        
        .nav-header { display: flex; align-items: center; margin-bottom: 12px; font-size: 15px; font-weight: 600; color: #58a6ff; }
        .nav-header span { margin-right: 10px; font-size: 18px; }

        .btn-group { display: flex; gap: 8px; }
        .btn-nav { border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center; height: 34px; }
        
        .btn-help { width: 34px; background: #30363d; color: #c9d1d9; }
        .btn-help:hover { background: #58a6ff; color: #ffffff; }
        
        .btn-code { flex: 1; background: #238636; color: #ffffff; }
        .btn-code:hover { background: #2ea043; }

        /* Редактор и Консоль */
        .editor-section { flex: 1; display: flex; flex-direction: column; padding: 20px; background: #0d1117; position: relative; }
        
        /* Стилизация CodeMirror */
        .CodeMirror { flex: 1; border-radius: 12px; border: 1px solid #30363d !important; font-size: 16px; font-family: 'Fira Code', monospace; line-height: 1.5; height: auto !important; }
        
        .action-bar { display: flex; gap: 12px; margin-top: 15px; }
        #run-btn { flex: 3; background: #238636; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        #run-btn:hover { background: #2ea043; transform: translateY(-2px); }
        .btn-secondary { flex: 1; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px; cursor: pointer; }

        #output { height: 180px; background: #010409; color: #39d353; padding: 15px; font-family: 'Fira Code', monospace; border-radius: 12px; border: 1px solid #30363d; margin-top: 15px; overflow-y: auto; white-space: pre-wrap; font-size: 14px; }

        /* Модалка */
        #modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); }
        .modal-box { background: #161b22; margin: 8% auto; padding: 30px; width: 60%; max-width: 650px; border-radius: 16px; border-left: 5px solid #58a6ff; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #8b949e; }
        .info-tag { color: #58a6ff; font-weight: bold; text-transform: uppercase; font-size: 11px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="m-title" style="margin-top:0; color:#58a6ff"></h2>
        <div id="m-body" style="font-size: 15px; line-height: 1.7; color: #c9d1d9;"></div>
    </div>
</div>

<header>
    <h2 style="margin:0; font-size: 16px; letter-spacing: 1px;">🐍 PYTHON ACADEMY STUDIO</h2>
    <div id="status" style="font-size: 12px; color: #8b949e;">Синтаксис активен</div>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="nav-card">
            <div class="nav-header"><span>📣</span> Вывод текста</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('print')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('print(\'Привет!\')\nprint(2 + 2)')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span>📦</span> Переменные</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('vars')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('score = 10\nprint(f\"Твой счет: {score}\")')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span>🛤</span> Условия</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('if')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('x = 10\nif x > 5:\n    print(\"Больше\")\nelse:\n    print(\"Меньше\")')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span>🔄</span> Циклы</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('loops')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('for i in range(3):\n    print(f\"Шаг №{i}\")')">Пример</button>
            </div>
        </div>

        <button class="btn-secondary" style="width:100%; margin-top:10px; color:#f85149;" onclick="clearEditor()">Удалить весь код</button>
    </div>

    <div class="editor-section">
        <textarea id="code-input"></textarea>
        
        <div class="action-bar">
            <button id="run-btn" py-click="run">▶ ЗАПУСТИТЬ</button>
            <button class="btn-secondary" onclick="download()">СКАЧАТЬ .PY</button>
        </div>
        <div id="output">Консоль готова...</div>
    </div>
</div>

<script>
    // Инициализация CodeMirror
    const editor = CodeMirror.fromTextArea(document.getElementById("code-input"), {
        mode: "python",
        theme: "dracula",
        lineNumbers: true, // Номера строк
        indentUnit: 4,     // Размер отступа
        smartIndent: true, // Умные отступы
        matchBrackets: true, // Подсветка парных скобок
        autoCloseBrackets: true // Автозакрытие скобок
    });

    const explanations = {
        print: {
            title: "📣 Print",
            body: `<span class="info-tag">Суть:</span> Выводит текст или числа в консоль.<br>Текст пишем в кавычках: <code>print("Привет")</code>.`
        },
        vars: {
            title: "📦 Переменные",
            body: `<span class="info-tag">Суть:</span> Имя для хранения данных. Пишется: <code>имя = значение</code>.`
        },
        if: {
            title: "🛤 Условия",
            body: `<span class="info-tag">Важно:</span> После <code>if</code> ставим двоеточие и делаем отступ в 4 пробела для следующей строки.`
        },
        loops: {
            title: "🔄 Циклы",
            body: `<span class="info-tag">range:</span> <code>range(5)</code> заставит код повториться 5 раз.`
        }
    };

    function openHelp(key) {
        document.getElementById('m-title').innerHTML = explanations[key].title;
        document.getElementById('m-body').innerHTML = explanations[key].body;
        document.getElementById('modal').style.display = "block";
    }

    function closeModal() { document.getElementById('modal').style.display = "none"; }
    
    function addCode(code) {
        const currentCode = editor.getValue();
        editor.setValue(currentCode + (currentCode ? "\n\n" : "") + code);
        save();
    }

    function save() {
        localStorage.setItem('py_studio_codemirror', editor.getValue());
    }

    // Слушатель изменений в редакторе для автосохранения
    editor.on("change", save);

    function clearEditor() { 
        if(confirm("Очистить всё?")) { editor.setValue(""); save(); } 
    }

    function download() {
        const blob = new Blob([editor.getValue()], { type: 'text/plain' });
        const a = document.createElement('a');
        a.download = "main.py";
        a.href = URL.createObjectURL(blob);
        a.click();
    }

    window.onload = () => {
        const saved = localStorage.getItem('py_studio_codemirror');
        if(saved) editor.setValue(saved);
    }
</script>

<script type="py">
    import sys
    from js import document, editor # Импортируем объект editor из JS напрямую
    
    def run(event):
        out = document.getElementById("output")
        out.innerText = "Исполнение...\n"
        
        # Получаем значение кода через API CodeMirror
        code = editor.getValue()
        
        class Writer:
            def write(self, t): out.innerText += t
            def flush(self): pass
            
        sys.stdout = Writer()
        try:
            exec(code)
        except Exception as e:
            out.innerText += f"\nОшибка: {e}"
</script>
</body>
</html>
