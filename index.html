<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Python Console</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
        .box { max-width: 800px; margin: auto; }
        
        /* Поле ввода кода */
        #code-input {
            width: 100%;
            height: 200px;
            background: #1e1e1e;
            color: #dcdcaa;
            font-family: 'Consolas', monospace;
            padding: 15px;
            border: 1px solid #333;
            border-radius: 5px;
            font-size: 16px;
            resize: vertical;
        }

        /* Кнопка запуска */
        #run-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 25px;
            margin-top: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        #run-btn:hover { background: #45a049; }

        /* Консоль вывода */
        #output {
            margin-top: 20px;
            background: #000;
            color: #00ff00;
            padding: 15px;
            font-family: monospace;
            border-radius: 5px;
            min-height: 100px;
            white-space: pre-wrap;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>💻 Моя Python Консоль</h2>
    
    <textarea id="code-input" placeholder="Напиши свой Python код здесь...">
print("Привет с GitHub!")
x = 10
y = 5
print(f"Результат: {x} + {y} = {x + y}")
    </textarea>
    
    <button id="run-btn" py-click="run_python">Запустить код</button>

    <h3>Вывод:</h3>
    <div id="output"></div>
</div>

<script type="py">
    import sys
    from js import document

    def run_python(event):
        # Очищаем старый вывод
        out_div = document.getElementById("output")
        out_div.innerText = ""
        
        # Получаем код из текстового поля
        user_code = document.getElementById("code-input").value
        
        # Перенаправляем print в наш div
        class OutputWriter:
            def write(self, text):
                out_div.innerText += text
            def flush(self): pass
        
        sys.stdout = OutputWriter()
        
        try:
            # Магия запуска кода
            exec(user_code)
        except Exception as e:
            out_div.innerText += f"\nОШИБКА: {e}"
</script>

</body>
</html>
