<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Python Pro Learning Studio</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #1a1a1a; padding: 12px 25px; border-bottom: 2px solid #4CAF50; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Левая панель */
        .sidebar { width: 420px; background: #141414; border-right: 1px solid #333; overflow-y: auto; padding: 20px; }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .command-card { background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 12px; margin-bottom: 15px; transition: 0.3s; }
        .command-card:hover { border-color: #4CAF50; }
        .command-title { font-weight: bold; color: #4CAF50; margin-bottom: 8px; display: block; font-size: 14px; }
        
        .card-actions { display: flex; gap: 8px; }
        .btn-action { flex: 1; padding: 6px; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; transition: 0.2s; background: #252525; color: #ccc; }
        .btn-info { border-color: #2196F3; color: #2196F3; }
        .btn-info:hover { background: #2196F3; color: white; }
        .btn-example { border-color: #4CAF50; color: #4CAF50; }
        .btn-example:hover { background: #4CAF50; color: white; }

        /* Редактор */
        .editor-section { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        #code-input { flex: 1; background: #1a1a1a; color: #dcdcaa; font-family: 'Fira Code', 'Consolas', monospace; padding: 20px; border: 1px solid #333; border-radius: 10px; font-size: 16px; resize: none; outline: none; line-height: 1.6; }
        
        .controls { display: flex; gap: 12px; margin-top: 15px; }
        #run-btn { flex: 3; background: #4CAF50; color: white; border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-size: 20px; font-weight: bold; box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3); }
        #run-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-alt { flex: 1; background: #333; color: white; border: 1px solid #555; border-radius: 8px; cursor: pointer; }

        #output { height: 220px; background: #000; color: #00ff00; padding: 15px; font-family: 'Consolas', monospace; border-radius: 8px; border: 1px solid #444; margin-top: 15px; overflow-y: auto; white-space: pre-wrap; font-size: 14px; }

        /* Модальное окно */
        #modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { background: #1e1e1e; margin: 5% auto; padding: 40px; width: 70%; max-width: 800px; border-radius: 15px; border-left: 10px solid #2196F3; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 30px; cursor: pointer; color: #888; }
        .close-btn:hover { color: white; }
        
        .help-section { margin-bottom: 20px; }
        .help-section b { color: #2196F3; font-size: 1.1em; }
        .warning-box { background: #332b00; border-left: 4px solid #ffcc00; padding: 10px; margin: 10px 0; color: #fff; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeHelp()">&times;</span>
        <h2 id="modal-title" style="margin-top:0; color:#2196F3"></h2>
        <div id="modal-body" style="font-size: 16px; line-height: 1.7;"></div>
    </div>
</div>

<header>
    <h2 style="margin:0;">🐍 Python Learning Studio</h2>
    <div id="save-status" style="font-size: 12px; color: #4CAF50; font-weight: bold;">СИСТЕМА ГОТОВА</div>
</header>

<div class="main-container">
    <div class="sidebar">
        <h3 style="color: #888; font-size: 12px; text-transform: uppercase; margin-bottom: 20px;">Учебные модули</h3>

        <div class="command-card">
            <span class="command-title">Вывод данных (print)</span>
            <div class="card-actions">
                <button class="btn-action btn-info" onclick="showHelp('print')">Инфо</button>
                <button class="btn-action btn-example" onclick="insertExample('print(\'Привет, мир!\')\nprint(5 + 10)')">Пример</button>
            </div>
        </div>

        <div class="command-card">
            <span class="command-title">Переменные (x = 10)</span>
            <div class="card-actions">
                <button class="btn-action btn-info" onclick="showHelp('vars')">Инфо</button>
                <button class="btn-action btn-example" onclick="insertExample('name = \"Алекс\"\nage = 25\nprint(f\"{name} - {age} лет\")')">Пример</button>
            </div>
        </div>

        <div class="command-card">
            <span class="command-title">Условия (if / else)</span>
            <div class="card-actions">
                <button class="btn-action btn-info" onclick="showHelp('if')">Инфо</button>
                <button class="btn-action btn-example" onclick="insertExample('score = 85\nif score >= 90:\n    print(\"Отлично!\")\nelif score >= 70:\n    print(\"Хорошо\")\nelse:\n    print(\"Надо подучить\")')">Пример</button>
            </div>
        </div>

        <div class="command-card">
            <span class="command-title">Списки (Массивы)</span>
            <div class="card-actions">
                <button class="btn-action btn-info" onclick="showHelp('lists')">Инфо</button>
                <button class="btn-action btn-example" onclick="insertExample('items = [\"Меч\", \"Щит\"]\nitems.append(\"Зелье\")\nprint(f\"В сумке: {items}\")\nprint(f\"Первый предмет: {items[0]}\")')">Пример</button>
            </div>
        </div>

        <div class="command-card">
            <span class="command-title">Циклы (for / range)</span>
            <div class="card-actions">
                <button class="btn-action btn-info" onclick="showHelp('loops')">Инфо</button>
                <button class="btn-action btn-example" onclick="insertExample('for i in range(5):\n    print(f\"Повторение №{i+1}\")')">Пример</button>
            </div>
        </div>

        <button class="btn-action" style="margin-top:20px; width: 100%; border-color: #ff5555; color: #ff5555;" onclick="clearAll()">🗑 Очистить редактор</button>
    </div>

    <div class="editor-section">
        <textarea id="code-input" oninput="saveCode()" placeholder="Выбери команду или пример слева..."></textarea>
        
        <div class="controls">
            <button id="run-btn" py-click="run_python">▶ ЗАПУСТИТЬ КОД</button>
            <button class="btn-alt" onclick="downloadCode()">💾 .PY ФАЙЛ</button>
        </div>

        <div id="output">Результат вычислений появится здесь...</div>
    </div>
</div>

<script>
    const helpText = {
        print: {
            title: "Голос программы: Функция print()",
            body: `
                <div class="help-section"><b>Что это:</b> Это главная команда, которая заставляет компьютер "говорить" с тобой, выводя текст или числа в консоль.</div>
                <div class="help-section"><b>Зачем нужно:</b> Чтобы видеть результаты расчетов, проверять ошибки или просто приветствовать пользователя.</div>
                <div class="warning-box">📌 <b>Важно:</b> Текст всегда пишется в кавычках: "Привет". Числа пишутся без кавычек: 100.</div>
            `
        },
        vars: {
            title: "Цифровая память: Переменные",
            body: `
                <div class="help-section"><b>Что это:</b> Это именованная "коробка" в памяти компьютера. Мы даем ей имя (например, <code>x</code>) и кладем туда данные (число 5).</div>
                <div class="help-section"><b>Зачем нужно:</b> Чтобы компьютер мог что-то запомнить. Например, имя игрока или количество очков.</div>
                <div class="warning-box">⚠️ <b>Правило:</b> Имя переменной не может начинаться с цифры и не должно содержать пробелов!</div>
            `
        },
        if: {
            title: "Логика выбора: If / Else",
            body: `
                <div class="help-section"><b>Что это:</b> Развилка на дороге. Программа проверяет условие: если оно правда — идем направо, если нет — налево.</div>
                <div class="help-section"><b>Синтаксис:</b> <code>if условие:</code>. Двоеточие в конце — обязательно!</div>
                <div class="warning-box">🛑 <b>Критично:</b> Всегда делай 4 пробела (отступ) в строке ПОСЛЕ условия. Это показывает Python, какой код относится к этому условию.</div>
            `
        },
        lists: {
            title: "Органайзер: Списки",
            body: `
                <div class="help-section"><b>Что это:</b> Список покупок или инвентарь героя. Одна переменная, которая хранит сразу много предметов.</div>
                <div class="help-section"><b>Нумерация:</b> Запомни навсегда — программисты начинают считать с <b>0</b>. Первый предмет в списке имеет индекс [0].</div>
                <div class="help-section"><b>Функция append:</b> Используется для добавления нового предмета в конец списка.</div>
            `
        },
        loops: {
            title: "Бесконечный двигатель: Цикл For",
            body: `
                <div class="help-section"><b>Что это:</b> Команда, которая заставляет компьютер повторять одно и то же действие много раз.</div>
                <div class="help-section"><b>Функция range(5):</b> Создает "очередь" из пяти чисел (0, 1, 2, 3, 4). Цикл пройдет по ним по порядку.</div>
                <div class="warning-box">💡 <b>Совет:</b> Используй циклы, чтобы не писать 10 раз одну и ту же команду print.</div>
            `
        }
    };

    function showHelp(key) {
        document.getElementById('modal-title').innerText = helpText[key].title;
        document.getElementById('modal-body').innerHTML = helpText[key].body;
        document.getElementById('modal').style.display = "block";
    }

    function closeHelp() { document.getElementById('modal').style.display = "none"; }
    
    function insertExample(code) {
        const area = document.getElementById('code-input');
        area.value += (area.value ? "\n\n" : "") + code;
        saveCode();
    }

    function saveCode() {
        localStorage.setItem('py_learn_code', document.getElementById('code-input').value);
        document.getElementById('save-status').innerText = "СОХРАНЕНО: " + new Date().toLocaleTimeString();
    }

    function clearAll() { if(confirm("Удалить всё?")) { document.getElementById('code-input').value = ""; saveCode(); } }

    function downloadCode() {
        const text = document.getElementById('code-input').value;
        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.download = "my_lesson.py";
        a.href = URL.createObjectURL(blob);
        a.click();
    }

    window.onload = () => {
        const saved = localStorage.getItem('py_learn_code');
        if(saved) document.getElementById('code-input').value = saved;
    }
</script>

<script type="py">
    import sys
    from js import document
    def run_python(event):
        out = document.getElementById("output")
        out.innerText = ">>> Запуск программы...\n"
        code = document.getElementById("code-input").value
        class Writer:
            def write(self, t): out.innerText += t
            def flush(self): pass
        sys.stdout = Writer()
        try: exec(code)
        except Exception as e: out.innerText += f"\n[!] ОШИБКА В КОДЕ: {e}"
</script>
</body>
</html>
