<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Python Academy Studio Pro</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #161b22; padding: 15px 25px; border-bottom: 2px solid #238636; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Левая панель */
        .sidebar { width: 400px; background: #0d1117; border-right: 1px solid #30363d; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        .nav-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 12px; transition: all 0.2s ease; }
        .nav-card:hover { border-color: #238636; background: #1c2128; transform: translateX(4px); }
        
        .nav-header { display: flex; align-items: center; margin-bottom: 10px; font-size: 15px; font-weight: 600; color: #c9d1d9; }
        .nav-header span { margin-right: 12px; font-size: 18px; width: 24px; text-align: center; }

        .btn-group { display: flex; gap: 8px; }
        .btn-nav { border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center; height: 32px; }
        
        .btn-help { width: 32px; background: #30363d; color: #c9d1d9; font-size: 15px; }
        .btn-help:hover { background: #8b949e; color: #0d1117; }
        
        .btn-code { flex: 1; background: #238636; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-code:hover { background: #2ea043; }

        /* Редактор и Консоль */
        .editor-section { flex: 1; display: flex; flex-direction: column; padding: 20px; background: #0d1117; position: relative; }
        #code-input { flex: 1; background: #010409; color: #d7dae0; font-family: 'Fira Code', 'Consolas', monospace; padding: 20px; border: 1px solid #30363d; border-radius: 12px; font-size: 16px; resize: none; outline: none; line-height: 1.6; }
        
        .action-bar { display: flex; gap: 12px; margin-top: 15px; }
        #run-btn { flex: 3; background: #238636; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        #run-btn:hover { background: #2ea043; box-shadow: 0 0 15px rgba(46, 160, 67, 0.4); }
        .btn-secondary { flex: 1; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px; cursor: pointer; font-weight: 600; }

        #output { height: 180px; background: #010409; color: #7ee787; padding: 15px; font-family: 'Consolas', monospace; border-radius: 12px; border: 1px solid #30363d; margin-top: 15px; overflow-y: auto; white-space: pre-wrap; font-size: 14px; }

        /* Всплывающее окно */
        #modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .modal-box { background: #161b22; margin: 10% auto; padding: 30px; width: 90%; max-width: 600px; border-radius: 16px; border-top: 4px solid #58a6ff; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .close { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #8b949e; }
        .info-tag { color: #58a6ff; font-weight: bold; text-transform: uppercase; font-size: 11px; display: block; margin-bottom: 4px; }
        code { background: #21262d; padding: 2px 6px; border-radius: 4px; color: #ff7b72; }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="m-title" style="margin-top:0; color:#58a6ff"></h2>
        <div id="m-body" style="font-size: 15px; line-height: 1.6; color: #c9d1d9;"></div>
    </div>
</div>

<header>
    <h2 style="margin:0; font-size: 18px; letter-spacing: 1px;">🐍 PYTHON ACADEMY <span style="font-weight: normal; color: #8b949e; font-size: 14px;">| STUDIO</span></h2>
    <div id="status" style="font-size: 12px; color: #8b949e; background: #21262d; padding: 5px 12px; border-radius: 20px;">Система готова</div>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="nav-card">
            <div class="nav-header"><span style="color: #ffca28;">📣</span> Вывод текста</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('print')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('print(\'Привет, Питонист!\')')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span style="color: #4fc3f7;">📦</span> Переменные</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('vars')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('name = \"Герой\"\nhp = 100\nprint(f\"{name} имеет {hp} HP\")')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span style="color: #ff7043;">🧮</span> Математика</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('math')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('a = 10\nb = 3\nprint(\"Сумма:\", a + b)\nprint(\"Остаток:\", a % b)')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span style="color: #ba68c8;">🛤</span> Условия (if)</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('if')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('score = 85\nif score >= 90:\n    print(\"Отлично!\")\nelif score >= 70:\n    print(\"Хорошо\")\nelse:\n    print(\"Надо подтянуть\")')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span style="color: #81c784;">📚</span> Списки</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('lists')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('items = [\"Меч\", \"Щит\"]\nitems.append(\"Зелье\")\nprint(items[0]) # Первый предмет')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span style="color: #fff176;">📖</span> Словари</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('dicts')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('player = {\"lvl\": 5, \"xp\": 1200}\nprint(player[\"lvl\"])')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span style="color: #4db6ac;">🔄</span> Цикл For</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('loops')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('for i in range(3):\n    print(f\"Повтор №{i+1}\")')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span style="color: #fb8c00;">🔁</span> Цикл While</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('while')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('energy = 3\nwhile energy > 0:\n    print(\"Работаю...\")\n    energy -= 1')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span style="color: #f06292;">⚙️</span> Функции</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('funcs')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('def greet(target):\n    return f\"Привет, {target}!\"\n\nprint(greet(\"Мир\"))')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span style="color: #e57373;">⚠️</span> Ошибки</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('errors')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('try:\n    res = 10 / 0\nexcept Exception as e:\n    print(f\"Ошибка: {e}\")')">Пример</button>
            </div>
        </div>

        <button class="btn-secondary" style="width:100%; margin-top:10px; color:#f85149; border-color: rgba(248, 81, 73, 0.3); padding: 10px;" onclick="clearEditor()">Очистить редактор</button>
    </div>

    <div class="editor-section">
        <textarea id="code-input" spellcheck="false" oninput="save()" placeholder="Напиши код здесь или выбери пример слева..."></textarea>
        <div class="action-bar">
            <button id="run-btn" py-click="run">ЗАПУСТИТЬ КОД ▶</button>
            <button class="btn-secondary" onclick="download()">СКАЧАТЬ .PY</button>
        </div>
        <div id="output">Результат программы появится здесь...</div>
    </div>
</div>

<script>
    const explanations = {
        print: { title: "📣 Вывод данных (print)", body: `<span class="info-tag">Суть:</span> Показывает текст или числа в консоли.<br><code>print("Текст")</code>` },
        vars: { title: "📦 Переменные", body: `<span class="info-tag">Суть:</span> Хранилище данных. Используй знак <code>=</code> для присвоения значения.` },
        math: { title: "🧮 Математика", body: `<span class="info-tag">Операторы:</span> <code>+</code>, <code>-</code>, <code>*</code>, <code>/</code>, <code>%</code> (остаток), <code>**</code> (степень).` },
        if: { title: "🛤 Условия (if/else)", body: `<span class="info-tag">Суть:</span> Выполняет код, ТОЛЬКО если условие верно. Не забывай <b>отступ (4 пробела)</b> после двоеточия!` },
        lists: { title: "📚 Списки", body: `<span class="info-tag">Суть:</span> Набор элементов в скобках <code>[]</code>. Первый элемент всегда имеет индекс <code>0</code>.` },
        dicts: { title: "📖 Словари", body: `<span class="info-tag">Суть:</span> Данные в паре "ключ: значение". Похоже на телефонную книгу.` },
        loops: { title: "🔄 Цикл For", body: `<span class="info-tag">Суть:</span> Повторяет код заданное количество раз или перебирает список.` },
        while: { title: "🔁 Цикл While", body: `<span class="info-tag">Суть:</span> Повторяет код, пока условие остается истинным. Следи, чтобы цикл не стал бесконечным!` },
        funcs: { title: "⚙️ Функции (def)", body: `<span class="info-tag">Суть:</span> Именованный кусок кода, который можно вызывать по имени сколько угодно раз.` },
        errors: { title: "⚠️ Обработка ошибок", body: `<span class="info-tag">Суть:</span> Конструкция <code>try...except</code> спасает программу от вылета при возникновении ошибки.` }
    };

    function openHelp(key) {
        document.getElementById('m-title').innerHTML = explanations[key].title;
        document.getElementById('m-body').innerHTML = explanations[key].body;
        document.getElementById('modal').style.display = "block";
    }

    function closeModal() { document.getElementById('modal').style.display = "none"; }
    
    function addCode(code) {
        const input = document.getElementById('code-input');
        input.value += (input.value ? "\n\n" : "") + code;
        save();
        input.scrollTop = input.scrollHeight;
    }

    function save() { localStorage.setItem('py_studio_v2', document.getElementById('code-input').value); }
    function clearEditor() { if(confirm("Удалить весь код в редакторе?")) { document.getElementById('code-input').value = ""; save(); } }

    function download() {
        const blob = new Blob([document.getElementById('code-input').value], { type: 'text/plain' });
        const a = document.createElement('a');
        a.download = "my_code.py";
        a.href = URL.createObjectURL(blob);
        a.click();
    }

    window.onload = () => {
        const saved = localStorage.getItem('py_studio_v2');
        if(saved) document.getElementById('code-input').value = saved;
    }
</script>

<script type="py">
    import sys
    import io
    from js import document

    def run(event):
        out_div = document.getElementById("output")
        code = document.getElementById("code-input").value
        out_div.innerText = "Исполнение...\n"
        
        # Перехватываем вывод print
        output_buffer = io.StringIO()
        sys.stdout = output_buffer
        sys.stderr = output_buffer
        
        try:
            exec(code)
            result = output_buffer.getvalue()
            out_div.innerText = result if result else "Код выполнен (вывода нет)"
        except Exception as e:
            out_div.innerText = f"❌ ОШИБКА:\n{str(e)}"
        finally:
            sys.stdout = sys.__stdout__
            sys.stderr = sys.__stderr__
</script>
</body>
</html>
