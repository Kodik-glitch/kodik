<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Python Pro Academy</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #161b22; padding: 15px 25px; border-bottom: 2px solid #238636; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Левая панель */
        .sidebar { width: 380px; background: #0d1117; border-right: 1px solid #30363d; overflow-y: auto; padding: 20px; }
        .nav-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .nav-header { display: flex; align-items: center; margin-bottom: 10px; font-weight: 600; color: #58a6ff; }
        .btn-group { display: flex; gap: 8px; }
        .btn-nav { border: none; border-radius: 6px; cursor: pointer; font-weight: bold; height: 34px; transition: 0.2s; }
        .btn-help { width: 36px; background: #30363d; color: #c9d1d9; font-size: 16px; }
        .btn-help:hover { background: #8b949e; color: #161b22; }
        .btn-code { flex: 1; background: #238636; color: white; font-size: 12px; }
        .btn-code:hover { background: #2ea043; }

        /* Стили редактора */
        .editor-section { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        .CodeMirror { flex: 1; border-radius: 12px; font-size: 16px; border: 1px solid #30363d !important; height: auto !important; }
        
        .action-bar { display: flex; gap: 10px; margin-top: 15px; }
        #run-btn { flex: 3; background: #238636; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .btn-sec { flex: 1; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px; cursor: pointer; }

        #output { height: 180px; background: #010409; color: #39d353; padding: 15px; font-family: 'Consolas', monospace; border-radius: 12px; border: 1px solid #30363d; margin-top: 15px; overflow-y: auto; white-space: pre-wrap; }

        /* Модалка */
        #modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .modal-box { background: #161b22; margin: 10% auto; padding: 30px; width: 60%; border-radius: 16px; border-top: 4px solid #58a6ff; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #8b949e; }
        .tag { color: #58a6ff; font-weight: bold; font-size: 12px; display: block; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="m-title" style="margin-top:0; color:#58a6ff"></h2>
        <div id="m-body" style="line-height: 1.6;"></div>
    </div>
</div>

<header>
    <h2 style="margin:0;">🐍 Python Academy</h2>
    <div id="status" style="font-size: 12px; color: #8b949e;">Редактор готов</div>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="nav-card">
            <div class="nav-header"><span>📣</span> Вывод текста</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('print')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('print(\'Привет!\')')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span>📦</span> Переменные</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('vars')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('score = 10\nprint(score)')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-header"><span>🛤</span> Условия</div>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('if')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('if score > 5:\n    print(\"Ого!\")')">Пример</button>
            </div>
        </div>

        <button class="btn-sec" style="width:100%; margin-top:20px; color:#f85149;" onclick="clearAll()">Очистить всё</button>
    </div>

    <div class="editor-section">
        <textarea id="code-input"></textarea>
        
        <div class="action-bar">
            <button id="run-btn" py-click="run">ЗАПУСТИТЬ КОД</button>
            <button class="btn-sec" onclick="download()">СКАЧАТЬ .PY</button>
        </div>
        <div id="output">Результат...</div>
    </div>
</div>

<script>
    // Инициализация CodeMirror
    const editor = CodeMirror.fromTextArea(document.getElementById("code-input"), {
        mode: "python",
        theme: "dracula",
        lineNumbers: true,
        indentUnit: 4,
        matchBrackets: true
    });

    const explanations = {
        print: { title: "📣 Print", body: "<span class='tag'>Суть:</span> Выводит данные на экран.<br>Текст пишем в кавычках, переменные — без." },
        vars: { title: "📦 Переменные", body: "<span class='tag'>Суть:</span> Имя для хранения данных. Пишем <code>имя = значение</code>." },
        if: { title: "🛤 Условия", body: "<span class='tag'>Ловушка:</span> Не забывай двоеточие в конце и 4 пробела в начале следующей строки!" }
    };

    function openHelp(k) {
        document.getElementById('m-title').innerText = explanations[k].title;
        document.getElementById('m-body').innerHTML = explanations[k].body;
        document.getElementById('modal').style.display = "block";
    }

    function closeModal() { document.getElementById('modal').style.display = "none"; }
    
    function addCode(c) {
        const current = editor.getValue();
        editor.setValue(current + (current ? "\n\n" : "") + c);
    }

    function clearAll() { if(confirm("Очистить?")) editor.setValue(""); }

    function download() {
        const blob = new Blob([editor.getValue()], { type: 'text/plain' });
        const a = document.createElement('a');
        a.download = "script.py";
        a.href = URL.createObjectURL(blob);
        a.click();
    }

    // Сохранение в LocalStorage
    editor.on("change", () => {
        localStorage.setItem('py_editor_pro', editor.getValue());
    });

    window.onload = () => {
        const saved = localStorage.getItem('py_editor_pro');
        if(saved) editor.setValue(saved);
    };
</script>

<script type="py">
    import sys
    from js import document, editor # Импортируем объект редактора из JS
    
    def run(event):
        out = document.getElementById("output")
        out.innerText = ">>> Запуск...\n"
        # Получаем значение напрямую из CodeMirror через JS-интерфейс
        code = editor.getValue()
        
        class Writer:
            def write(self, t): out.innerText += t
            def flush(self): pass
        sys.stdout = Writer()
        try: exec(code)
        except Exception as e: out.innerText += f"\nОшибка: {e}"
</script>
</body>
</html>
