<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Python Dev Academy Pro</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 🛑 СКРЫТИЕ СИСТЕМНОГО ТЕРМИНАЛА PYSCRIPT 🛑 */
        py-terminal, .py-terminal, #py-terminal, py-config, .py-overlay, py-splashscreen, 
        section[class*="pyscript"], div[class*="pyscript"], .pyscript-terminal { 
            display: none !important; 
            visibility: hidden !important; 
            opacity: 0 !important; 
            height: 0 !important; 
            width: 0 !important; 
            position: absolute !important; 
            z-index: -1000 !important;
        }

        header { background: #161b22; padding: 15px 25px; border-bottom: 2px solid #238636; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 380px; background: #0d1117; border-right: 1px solid #30363d; overflow-y: auto; padding: 20px; }
        .nav-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .nav-title { font-weight: 600; color: #58a6ff; display: flex; align-items: center; gap: 8px; font-size: 15px; }
        .nav-keywords { display: block; font-size: 11px; color: #8b949e; margin: 4px 0 10px 28px; font-family: 'Consolas', monospace; }

        .btn-group { display: flex; gap: 8px; }
        .btn-nav { border: none; border-radius: 6px; cursor: pointer; font-weight: bold; height: 34px; transition: 0.2s; }
        .btn-help { width: 36px; background: #30363d; color: #c9d1d9; font-size: 18px; }
        .btn-help:hover { background: #58a6ff; color: white; }
        .btn-code { flex: 1; background: #238636; color: white; font-size: 11px; text-transform: uppercase; }
        .btn-code:hover { background: #2ea043; }

        /* Editor */
        .editor-section { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        .CodeMirror { flex: 1; border-radius: 12px; font-size: 16px; border: 1px solid #30363d !important; }
        
        .action-bar { display: flex; gap: 10px; margin-top: 15px; }
        #run-btn { flex: 3; background: #238636; color: white; border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .btn-sec { flex: 1; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px; cursor: pointer; }

        #output { height: 180px; background: #010409; color: #39d353; padding: 15px; font-family: 'Fira Code', monospace; border-radius: 12px; border: 1px solid #30363d; margin-top: 15px; overflow-y: auto; white-space: pre-wrap; }

        /* Modal */
        #modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); }
        .modal-box { background: #161b22; margin: 8% auto; padding: 30px; width: 65%; max-width: 750px; border-radius: 16px; border-left: 6px solid #58a6ff; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #8b949e; }
        .m-section { margin-bottom: 15px; }
        .m-section b { color: #58a6ff; }
        .warning { background: #332b00; border-radius: 6px; padding: 10px; margin-top: 10px; color: #ffd33d; font-size: 14px; border-left: 3px solid #ffd33d; }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="m-title" style="margin-top:0; color:#58a6ff;"></h2>
        <div id="m-body" style="font-size: 16px; line-height: 1.6;"></div>
    </div>
</div>

<header>
    <h2 style="margin:0; font-size: 18px;">🐍 Python Academy Pro</h2>
    <div style="font-size: 12px; color: #8b949e;">Терминал PyScript скрыт</div>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="nav-card">
            <div class="nav-title"><span>📣</span> Вывод данных</div>
            <span class="nav-keywords">print(), f-strings, \n</span>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('print')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('print(f\"Результат: {10 * 5}\")')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-title"><span>📦</span> Переменные</div>
            <span class="nav-keywords">x = 5, str, int, float</span>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('vars')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('name = \"Алекс\"\nhp = 100\nprint(name, hp)')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-title"><span>🛤</span> Условия</div>
            <span class="nav-keywords">if, elif, else, ==, and</span>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('if')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('age = 18\nif age >= 18:\n    print(\"Доступ разрешен\")')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-title"><span>🔄</span> Циклы</div>
            <span class="nav-keywords">for, while, range()</span>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('loops')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('for i in range(5):\n    print(\"Привет!\", i)')">Пример</button>
            </div>
        </div>

        <div class="nav-card">
            <div class="nav-title"><span>📚</span> Списки</div>
            <span class="nav-keywords">[], .append(), len()</span>
            <div class="btn-group">
                <button class="btn-nav btn-help" onclick="openHelp('lists')">?</button>
                <button class="btn-nav btn-code" onclick="addCode('items = [\"Меч\", \"Щит\"]\nitems.append(\"Шлем\")\nprint(items)')">Пример</button>
            </div>
        </div>

        <button class="btn-sec" style="width:100%; margin-top:20px; color:#f85149;" onclick="clearAll()">🗑 Очистить редактор</button>
    </div>

    <div class="editor-section">
        <textarea id="code-input"></textarea>
        <div class="action-bar">
            <button id="run-btn" py-click="run">▶ ЗАПУСТИТЬ КОД</button>
            <button class="btn-sec" onclick="download()">СКАЧАТЬ .PY</button>
        </div>
        <div id="output">Консоль готова...</div>
    </div>
</div>

<script>
    const editor = CodeMirror.fromTextArea(document.getElementById("code-input"), {
        mode: "python", theme: "dracula", lineNumbers: true, indentUnit: 4, autoCloseBrackets: true
    });

    const helpData = {
        print: {
            title: "📣 Функция Print",
            body: `<div class="m-section"><b>Что делает:</b> Показывает текст или числа в консоли.</div>
                   <div class="m-section"><b>Как писать:</b> <code>print("Текст")</code>. Используй <b>f-строки</b> для вставки переменных: <code>f"Привет, {name}"</code>.</div>
                   <div class="warning">💡 Не забывай кавычки для текста! Без них Python будет искать переменную с таким именем.</div>`
        },
        vars: {
            title: "📦 Переменные",
            body: `<div class="m-section"><b>Что делает:</b> Хранит данные в памяти под выбранным именем.</div>
                   <div class="m-section"><b>Пример:</b> <code>level = 1</code>. Теперь везде вместо "1" можно писать "level".</div>
                   <div class="warning">⚠️ Имя переменной не может начинаться с цифры и содержать пробелы.</div>`
        },
        if: {
            title: "🛤 Условия",
            body: `<div class="m-section"><b>Что делает:</b> Выполняет код только если условие верно.</div>
                   <div class="m-section"><b>Важно:</b> После <code>if</code> ставится двоеточие <b>:</b>, а следующая строка идет с <b>отступом</b>.</div>
                   <div class="warning">🛑 Отступы в Python — это не просто красота, это часть логики!</div>`
        },
        loops: {
            title: "🔄 Циклы",
            body: `<div class="m-section"><b>Что делает:</b> Повторяет код многократно. <code>range(5)</code> выполнит цикл 5 раз.</div>
                   <div class="m-section"><b>Зачем:</b> Чтобы не писать одну и ту же команду 100 раз подряд.</div>`
        },
        lists: {
            title: "📚 Списки",
            body: `<div class="m-section"><b>Что делает:</b> Группирует много значений в одну переменную.</div>
                   <div class="m-section"><b>Помни:</b> Первый элемент списка всегда имеет индекс <b>0</b>.</div>`
        }
    };

    function openHelp(k) {
        document.getElementById('m-title').innerHTML = helpData[k].title;
        document.getElementById('m-body').innerHTML = helpData[k].body;
        document.getElementById('modal').style.display = "block";
    }
    function closeModal() { document.getElementById('modal').style.display = "none"; }
    function addCode(c) {
        const v = editor.getValue();
        editor.setValue(v + (v ? "\n\n" : "") + c);
    }
    function clearAll() { if(confirm("Очистить?")) editor.setValue(""); }
    function download() {
        const b = new Blob([editor.getValue()], {type:'text/plain'});
        const a = document.createElement('a'); a.download="script.py"; a.href=URL.createObjectURL(b); a.click();
    }

    editor.on("change", () => localStorage.setItem('py_code_final', editor.getValue()));
    window.onload = () => {
        const s = localStorage.getItem('py_code_final');
        if(s) editor.setValue(s);
    }
</script>

<script type="py">
    import sys
    from js import document, editor
    
    def run(event):
        out = document.getElementById("output")
        out.innerText = ">>> Выполнение...\n"
        
        class Writer:
            def write(self, t): out.innerText += t
            def flush(self): pass
            
        sys.stdout = Writer()
        try:
            exec(editor.getValue())
        except Exception as e:
            out.innerText += f"\n[Ошибка]: {e}"
</script>
</body>
</html>
