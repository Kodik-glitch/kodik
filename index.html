<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Python IDE на GitHub</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #1e1e1e; color: white; }
        .container { max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Стили для области вывода */
        #output { 
            background: #000; 
            color: #00ff00; 
            padding: 15px; 
            border-radius: 5px; 
            font-family: 'Courier New', Courier, monospace;
            min-height: 150px;
            border: 1px solid #444;
            margin-top: 20px;
            overflow-y: auto;
        }

        /* Настройка высоты редактора */
        py-editor {
            display: block;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .hint { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🐍 My Python Browser IDE</h1>
        <span class="hint">Нажми иконку "Play" или Shift+Enter для запуска</span>
    </div>

    <py-editor>
# Пиши свой код здесь!
import math

print("Привет! Давай посчитаем:")
x = 25
print(f"Квадратный корень из {x} равен {math.sqrt(x)}")

for i in range(3):
    print(f"Строка номер {i+1}")
    </py-editor>

    <h3>Консоль вывода:</h3>
    <div id="output"></div>
</div>

<script type="py">
    # Скрипт для перенаправления вывода print() в наш черный блок
    import sys
    from js import document

    class OutputWriter:
        def write(self, text):
            out_div = document.getElementById("output")
            # Добавляем текст и прокручиваем вниз
            out_div.innerText += text
        def flush(self):
            pass

    sys.stdout = OutputWriter()
</script>

</body>
</html>
