<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Python Academy Studio Pro</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #161b22; padding: 15px 25px; border-bottom: 2px solid #005cc5; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Левая панель */
        .sidebar { width: 350px; background: #0d1117; border-right: 1px solid #30363d; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        .nav-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; transition: all 0.2s ease; }
        .nav-card:hover { border-color: #005cc5; background: #1c2128; }
        
        .nav-header { display: flex; align-items: center; margin-bottom: 12px; font-size: 16px; font-weight: 600; }
        .nav-header span { margin-right: 12px; font-size: 20px; width: 24px; text-align: center; }

        .btn-info { 
            width: 100%; 
            background: #21262d; 
            color: #58a6ff; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 600; 
            padding: 10px; 
            transition: all 0.3s ease; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
        }
        .btn-info:hover { 
            background: #005cc5; 
            color: white; 
            border-color: #58a6ff; 
            box-shadow: 0 0 12px rgba(0, 92, 197, 0.4); 
            transform: translateY(-2px); 
        }

        /* Редактор */
        .editor-section { flex: 1; display: flex; flex-direction: column; padding: 20px; background: #0d1117; }
        #code-input { flex: 1; background: #010409; color: #d7dae0; font-family: 'Fira Code', 'Consolas', monospace; padding: 20px; border: 1px solid #30363d; border-radius: 12px; font-size: 16px; resize: none; outline: none; line-height: 1.6; }
        
        .action-bar { display: flex; gap: 12px; margin-top: 15px; }
        
        #run-btn { flex: 3; background: #005cc5; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; }
        #run-btn:hover { background: #0366d6; transform: scale(1.01); }
        
        .btn-secondary { flex: 1; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-secondary:hover { background: #30363d; color: #58a6ff; }

        #output { 
            height: 180px; 
            background: #010409; 
            color: #58a6ff; 
            padding: 15px; 
            font-family: monospace; 
            border-radius: 12px; 
            border: 1px solid #30363d; 
            margin-top: 15px; 
            overflow-y: auto; 
            white-space: pre-wrap; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5); 
        }

        /* Модальное окно */
        #modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-box { 
            background: #161b22; 
            margin: 2% auto; 
            padding: 30px; 
            width: 90%; 
            max-width: 650px; 
            border-radius: 20px; 
            border-top: 5px solid #005cc5; 
            position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            max-height: 90vh;
            overflow-y: auto;
        }
        .close { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #8b949e; transition: 0.2s; }
        .close:hover { color: #f85149; }
        
        .syntax-note { background: #1c2128; border-left: 4px solid #58a6ff; padding: 12px; margin: 15px 0; font-size: 14px; line-height: 1.4; color: #8b949e; }
        .syntax-note b { color: #c9d1d9; }

        .example-block { background: #010409; padding: 20px; border-radius: 12px; border: 1px solid #30363d; margin-top: 20px; position: relative; }
        .example-code { color: #d7dae0; font-family: 'Consolas', monospace; white-space: pre; font-size: 14px; display: block; overflow-x: auto; line-height: 1.5; }
        
        .copy-btn { position: absolute; right: 12px; top: -14px; background: #005cc5; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.2s; }
        .copy-btn:hover { background: #0366d6; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="m-title" style="margin-top:0; color:#58a6ff; font-size: 24px;"></h2>
        <div id="m-body" style="font-size: 16px; line-height: 1.6; color: #c9d1d9;"></div>
        
        <div id="m-syntax" class="syntax-note"></div>
        
        <div class="example-block">
            <button class="copy-btn" onclick="copyExample()">Копировать код</button>
            <div id="m-code" class="example-code"></div>
        </div>
    </div>
</div>

<header>
    <h2 style="margin:0; font-size: 20px; letter-spacing: 1px;">🐍 PYTHON <span style="color: #58a6ff;">ACADEMY</span></h2>
    <div id="status" style="font-size: 12px; color: #8b949e; background: #010409; padding: 6px 15px; border-radius: 20px; border: 1px solid #30363d;">Справочник синтаксиса обновлен</div>
</header>

<div class="main-container">
    <div class="sidebar">
        <script>
            const commands = [
                { id: 'print', icon: '📣', title: 'Вывод текста', color: '#ffca28' },
                { id: 'vars', icon: '📦', title: 'Переменные', color: '#4fc3f7' },
                { id: 'math', icon: '🧮', title: 'Математика', color: '#ff7043' },
                { id: 'if', icon: '🛤', title: 'Условия (if)', color: '#ba68c8' },
                { id: 'lists', icon: '📚', title: 'Списки', color: '#81c784' },
                { id: 'dicts', icon: '📖', title: 'Словари', color: '#fff176' },
                { id: 'for', icon: '🔄', title: 'Цикл For', color: '#4db6ac' },
                { id: 'while', icon: '🔁', title: 'Цикл While', color: '#fb8c00' },
                { id: 'funcs', icon: '⚙️', title: 'Функции', color: '#f06292' },
                { id: 'errors', icon: '⚠️', title: 'Ошибки', color: '#e57373' }
            ];

            document.write(commands.map(cmd => `
                <div class="nav-card">
                    <div class="nav-header"><span style="color: ${cmd.color}">${cmd.icon}</span> ${cmd.title}</div>
                    <button class="btn-info" onclick="openHelp('${cmd.id}')">
                        <span>🔍</span> Подробнее
                    </button>
                </div>
            `).join(''));
        </script>
        
        <button class="btn-secondary" style="width:100%; margin-top:10px; color:#f85149; padding: 12px; font-weight: bold; border-color: #f8514933;" onclick="clearEditor()">ОЧИСТИТЬ ВСЁ</button>
    </div>

    <div class="editor-section">
        <textarea id="code-input" spellcheck="false" oninput="save()" placeholder="Напиши код здесь..."></textarea>
        <div class="action-bar">
            <button id="run-btn" py-click="run">ЗАПУСТИТЬ КОД ▶</button>
            <button class="btn-secondary" onclick="download()">СКАЧАТЬ .PY</button>
        </div>
        <div id="output">Результат программы появится здесь...</div>
    </div>
</div>

<script>
    const explanations = {
        print: { 
            title: "Вывод данных (print)", 
            desc: "Функция <b>print()</b> выводит информацию на экран. Это основной способ общения программы с пользователем.", 
            syntax: "<b>Синтаксис:</b> Текст всегда пишется внутри <b>кавычек</b> (' ' или \" \"). Сами данные передаются внутри круглых скобок. Несколько элементов можно разделять запятой.",
            code: 'print("Привет!")\nprint("Счет:", 100)' 
        },
        vars: { 
            title: "Переменные", 
            desc: "Переменные — это именованные области памяти для хранения данных (чисел, текста и т.д.).", 
            syntax: "<b>Синтаксис:</b> Сначала пишется <b>имя</b> (без пробелов), затем знак <b>=</b> (присваивание) и само значение. В Python не нужно указывать тип данных заранее.",
            code: 'user_name = "Alex"\nscore = 15\nprint(user_name)' 
        },
        math: { 
            title: "Математика", 
            desc: "Python поддерживает все стандартные операции: +, -, *, /.", 
            syntax: "<b>Синтаксис:</b> <b>**</b> используется для возведения в степень, <b>//</b> для деления нацело, а <b>%</b> для получения остатка. Порядок действий как в математике.",
            code: 'result = (10 + 2) * 5\npower = 2 ** 3  # 8\nprint(result)' 
        },
        if: { 
            title: "Условия (if / elif / else)", 
            desc: "Позволяет выполнять разные блоки кода в зависимости от того, истинно условие или ложно.", 
            syntax: "<b>Синтаксис:</b> После условия ОБЯЗАТЕЛЬНО ставится <b>двоеточие (:)</b>. Весь код внутри условия должен иметь <b>отступ (4 пробела)</b> — так Python понимает, что он относится к этому блоку.",
            code: 'age = 18\nif age >= 18:\n    print("Доступ открыт")\nelse:\n    print("Рано!")' 
        },
        lists: { 
            title: "Списки (Lists)", 
            desc: "Список — это упорядоченный набор элементов под одним именем.", 
            syntax: "<b>Синтаксис:</b> Элементы пишутся внутри <b>квадратных скобок [ ]</b> через запятую. Доступ к элементу идет по <b>индексу</b> (номеру), который начинается с <b>0</b>.",
            code: 'items = ["Меч", "Щит"]\nitems.append("Зелье")\nprint(items[0]) # Меч' 
        },
        dicts: { 
            title: "Словари (Dictionaries)", 
            desc: "Словарь хранит данные в формате 'Ключ: Значение'.", 
            syntax: "<b>Синтаксис:</b> Описывается внутри <b>фигурных скобок { }</b>. Ключ и значение разделяются <b>двоеточием</b>. Ключ — это как слово в обычном словаре, по которому мы ищем перевод.",
            code: 'player = {"hp": 100, "mp": 50}\nprint(player["hp"])' 
        },
        for: { 
            title: "Цикл For", 
            desc: "Используется для перебора элементов последовательности (например, списка) или выполнения кода N раз.", 
            syntax: "<b>Синтаксис:</b> <b>for элемент in список:</b>. Как и в 'if', в конце ставится <b>двоеточие</b>, а следующая строка идет с <b>отступом</b>. range(5) создаст числа от 0 до 4.",
            code: 'for i in range(3):\n    print(f"Шаг №{i}")' 
        },
        while: { 
            title: "Цикл While", 
            desc: "Цикл выполняется до тех пор, пока условие остается истинным.", 
            syntax: "<b>Синтаксис:</b> <b>while условие:</b>. Не забывай менять значение внутри цикла, иначе он станет 'бесконечным' и программа зависнет.",
            code: 'count = 5\nwhile count > 0:\n    print(count)\n    count -= 1' 
        },
        funcs: { 
            title: "Функции (def)", 
            desc: "Функция — это многоразовый блок кода, который срабатывает только тогда, когда его вызывают.", 
            syntax: "<b>Синтаксис:</b> Создается через ключевое слово <b>def</b>, затем имя и скобки <b>( )</b>. Чтобы функция вернула результат в программу, используется <b>return</b>.",
            code: 'def sum(a, b):\n    return a + b\n\nres = sum(5, 5)\nprint(res)' 
        },
        errors: { 
            title: "Ошибки (try / except)", 
            desc: "Механизм 'отлова' ошибок, чтобы программа не закрывалась при сбое.", 
            syntax: "<b>Синтаксис:</b> В блоке <b>try:</b> мы пишем 'опасный' код, а в <b>except:</b> — что делать, если случилась беда. Это предотвращает вылет приложения.",
            code: 'try:\n    x = 1 / 0\nexcept:\n    print("На ноль делить нельзя!")' 
        }
    };

    let currentExample = "";

    function openHelp(key) {
        const info = explanations[key];
        document.getElementById('m-title').innerHTML = info.title;
        document.getElementById('m-body').innerHTML = info.desc;
        document.getElementById('m-syntax').innerHTML = info.syntax;
        document.getElementById('m-code').innerText = info.code;
        currentExample = info.code;
        document.getElementById('modal').style.display = "block";
    }

    function closeModal() { document.getElementById('modal').style.display = "none"; }
    
    function copyExample() {
        navigator.clipboard.writeText(currentExample);
        const btn = document.querySelector('.copy-btn');
        btn.innerText = "Скопировано! ✅";
        setTimeout(() => { btn.innerText = "Копировать код"; }, 1500);
    }

    function save() { localStorage.setItem('py_studio_edu', document.getElementById('code-input').value); }
    function clearEditor() { if(confirm("Стереть всё?")) { document.getElementById('code-input').value = ""; save(); } }
    
    function download() {
        const blob = new Blob([document.getElementById('code-input').value], { type: 'text/plain' });
        const a = document.createElement('a');
        a.download = "lesson.py";
        a.href = URL.createObjectURL(blob);
        a.click();
    }

    window.onload = () => {
        const saved = localStorage.getItem('py_studio_edu');
        if(saved) document.getElementById('code-input').value = saved;
    }
</script>

<script type="py">
    import sys
    import io
    from js import document

    def run(event):
        out_div = document.getElementById("output")
        code = document.getElementById("code-input").value
        out_div.innerText = ""
        
        output_buffer = io.StringIO()
        sys.stdout = output_buffer
        sys.stderr = output_buffer
        
        try:
            exec(code)
            result = output_buffer.getvalue()
            out_div.innerText = result if result else "Код выполнен без ошибок."
        except Exception as e:
            out_div.innerText = f"❌ ОШИБКА:\n{str(e)}"
        finally:
            sys.stdout = sys.__stdout__
            sys.stderr = sys.__stderr__
</script>
</body>
</html>
