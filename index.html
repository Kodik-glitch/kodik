<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Python Lite Studio</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 🛑 СКРЫВАЕМ СТАНДАРТНЫЙ ТЕРМИНАЛ PYSCRIPT 🛑 */
        py-terminal, .py-terminal, py-config, .py-overlay, py-splashscreen { 
            display: none !important; 
            visibility: hidden !important; 
        }

        header { background: #161b22; padding: 15px 25px; border-bottom: 2px solid #238636; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 350px; background: #0d1117; border-right: 1px solid #30363d; padding: 20px; overflow-y: auto; }
        .nav-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 15px; margin-bottom: 12px; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn-code { flex: 1; background: #238636; color: white; border: none; border-radius: 4px; padding: 8px; cursor: pointer; font-weight: bold; }

        /* Редактор "Сэндвич" */
        .editor-container { flex: 1; position: relative; margin: 20px; background: #010409; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; }
        
        #editing, #highlighting {
            margin: 0; padding: 20px;
            width: 100%; height: 100%;
            font-family: 'Fira Code', monospace;
            font-size: 16px; line-height: 1.5;
            position: absolute; top: 0; left: 0;
            white-space: pre; overflow: auto;
        }

        /* textarea — прозрачный и сверху */
        #editing {
            z-index: 1;
            background: transparent;
            color: transparent;
            caret-color: white; /* Курсор при этом виден! */
            resize: none;
            border: none;
            outline: none;
        }

        /* блок с подсветкой — внизу */
        #highlighting { z-index: 0; pointer-events: none; }
        code[class*="language-"] { background: transparent !important; }

        .action-bar { display: flex; gap: 10px; padding: 0 20px 20px 20px; }
        #run-btn { flex: 3; background: #238636; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }
        #output { height: 150px; background: #010409; color: #39d353; padding: 15px; font-family: monospace; border-top: 1px solid #30363d; overflow-y: auto; white-space: pre-wrap; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0;">🐍 Python Lite Studio</h2>
    <div style="font-size: 12px; color: #8b949e;">Без CodeMirror | Скрытый терминал</div>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="nav-card">
            <div style="color:#58a6ff; font-weight:bold;">📣 Вывод</div>
            <div class="btn-group">
                <button class="btn-code" onclick="addCode('print(\'Привет, PyScript!\')')">Пример</button>
            </div>
        </div>
        <div class="nav-card">
            <div style="color:#58a6ff; font-weight:bold;">🔄 Цикл</div>
            <div class="btn-group">
                <button class="btn-code" onclick="addCode('for i in range(5):\n    print(f\"Шаг {i}\")')">Пример</button>
            </div>
        </div>
    </div>

    <div style="display: flex; flex-direction: column; flex: 1;">
        <div class="editor-container">
            <textarea id="editing" spellcheck="false" oninput="updateContent(); syncScroll();" onscroll="syncScroll();"></textarea>
            <pre id="highlighting" aria-hidden="true"><code class="language-python" id="highlighting-content"></code></pre>
        </div>
        
        <div class="action-bar">
            <button id="run-btn" py-click="run">▶ ЗАПУСТИТЬ</button>
        </div>
        <div id="output">Результат...</div>
    </div>
</div>

<script>
    const elEditing = document.getElementById("editing");
    const elHighlighting = document.getElementById("highlighting-content");
    const elPre = document.getElementById("highlighting");

    function updateContent() {
        let text = elEditing.value;
        // Костыль для корректного отображения последнего переноса строки
        if(text[text.length-1] == "\n") text += " "; 
        
        // Заменяем спецсимволы, чтобы HTML не ломался
        elHighlighting.textContent = text;
        // Запускаем Prism для раскраски
        Prism.highlightElement(elHighlighting);
        localStorage.setItem('py_lite_code', elEditing.value);
    }

    function syncScroll() {
        elPre.scrollTop = elEditing.scrollTop;
        elPre.scrollLeft = elEditing.scrollLeft;
    }

    function addCode(code) {
        elEditing.value += (elEditing.value ? "\n\n" : "") + code;
        updateContent();
    }

    // Обработка клавиши Tab (чтобы не улетал фокус)
    elEditing.onkeydown = function(e) {
        if (e.key == 'Tab') {
            e.preventDefault();
            let start = this.selectionStart;
            let end = this.selectionEnd;
            this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
            this.selectionStart = this.selectionEnd = start + 4;
            updateContent();
        }
    };

    window.onload = () => {
        const saved = localStorage.getItem('py_lite_code');
        if(saved) {
            elEditing.value = saved;
            updateContent();
        }
    }
</script>

<script type="py">
    import sys
    from js import document
    
    def run(event):
        out = document.getElementById("output")
        out.innerText = ">>> Выполнение...\n"
        code = document.getElementById("editing").value
        
        class Writer:
            def write(self, t): out.innerText += t
            def flush(self): pass
            
        sys.stdout = Writer()
        try:
            exec(code)
        except Exception as e:
            out.innerText += f"\nОшибка: {e}"
</script>

</body>
</html>
