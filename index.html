<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Python Ultimate Studio</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #1f1f1f; padding: 10px 20px; border-bottom: 2px solid #4CAF50; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Левая панель */
        .sidebar { width: 380px; background: #181818; border-right: 1px solid #333; overflow-y: auto; padding: 15px; }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; border-bottom: 1px solid #4CAF50; padding-bottom: 5px; }
        .section-header h3 { color: #4CAF50; margin: 0; font-size: 14px; text-transform: uppercase; }
        
        .help-btn { background: #333; color: #4CAF50; border: 1px solid #4CAF50; border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 10px; }
        .btn-project { background: #2a2a2a; color: #eee; border: 1px solid #444; padding: 8px; width: 100%; text-align: left; margin-top: 5px; cursor: pointer; border-radius: 4px; font-size: 13px; }
        .btn-project:hover { border-color: #4CAF50; background: #333; }

        pre { background: #252525; padding: 10px; border-radius: 4px; font-size: 12px; color: #dcdcaa; cursor: pointer; margin-top: 8px; border: 1px solid transparent; }
        pre:hover { border-color: #4CAF50; }

        /* Центр: Редактор */
        .editor-section { flex: 1; display: flex; flex-direction: column; padding: 20px; background: #121212; }
        #code-input { flex: 1; background: #1e1e1e; color: #dcdcaa; font-family: 'Consolas', monospace; padding: 15px; border: 1px solid #333; border-radius: 5px; font-size: 16px; resize: none; line-height: 1.5; outline: none; }
        
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        #run-btn { flex: 2; background: #4CAF50; color: white; border: none; padding: 15px; border-radius: 4px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .btn-alt { flex: 1; background: #333; color: white; border: 1px solid #555; border-radius: 4px; cursor: pointer; }

        #output { height: 180px; background: #000; color: #00ff00; padding: 15px; font-family: monospace; border-radius: 5px; border: 1px solid #444; margin-top: 10px; overflow-y: auto; white-space: pre-wrap; }

        /* Модалка */
        #modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .modal-content { background: #252525; margin: 10% auto; padding: 30px; width: 60%; max-width: 600px; border-radius: 12px; border: 1px solid #4CAF50; }
        .status-msg { font-size: 11px; color: #888; }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-content">
        <span style="float:right; cursor:pointer; font-size:24px;" onclick="closeHelp()">&times;</span>
        <h2 id="modal-title" style="color:#4CAF50"></h2>
        <div id="modal-body" style="line-height:1.6"></div>
    </div>
</div>

<header>
    <h2 style="margin:0;">🐍 Python Ultimate Studio</h2>
    <div id="save-status" class="status-msg">Код сохранен</div>
</header>

<div class="main-container">
    <div class="sidebar">
        <h3>🚀 Готовые проекты</h3>
        <button class="btn-project" onclick="loadProject('guess')">🎯 Игра: Угадай число</button>
        <button class="btn-project" onclick="loadProject('pass')">🔐 Генератор паролей</button>
        <button class="btn-project" onclick="loadProject('timer')">⏳ Таймер обратного отсчета</button>

        <div class="section-header">
            <h3>Переменные</h3>
            <button class="help-btn" onclick="showHelp('vars')">ИНФО</button>
        </div>
        <pre onclick="copyCode(this)">name = "Игрок"
hp = 100</pre>

        <div class="section-header">
            <h3>Условия</h3>
            <button class="help-btn" onclick="showHelp('if')">ИНФО</button>
        </div>
        <pre onclick="copyCode(this)">if hp <= 0:
    print("Игра окончена")</pre>

        <div class="section-header">
            <h3>Циклы</h3>
            <button class="help-btn" onclick="showHelp('loops')">ИНФО</button>
        </div>
        <pre onclick="copyCode(this)">for i in range(3):
    print("Загрузка...")</pre>

        <button class="btn-project" style="margin-top:30px; border-color:#ff5555; color:#ff5555;" onclick="clearAll()">🗑 Очистить редактор</button>
    </div>

    <div class="editor-section">
        <textarea id="code-input" oninput="saveCode()" placeholder="Напиши свой код или выбери проект слева..."></textarea>
        
        <div class="controls">
            <button id="run-btn" py-click="run_python">ЗАПУСТИТЬ КОД</button>
            <button class="btn-alt" onclick="downloadCode()">💾 СКАЧАТЬ .PY</button>
        </div>

        <div id="output">Результат появится здесь...</div>
    </div>
</div>

<script>
    const projects = {
        guess: "import random\nsecret = random.randint(1, 10)\nprint('Угадай число от 1 до 10!')\n# В этом редакторе мы просто задаем значение вручную:\npopitka = 5\nif popitka == secret:\n    print(f'Верно! Это было {secret}')\nelse:\n    print(f'Мимо! Было загадано {secret}')",
        pass: "import random\nsymbols = 'abcdefgh12345!@#'\npassword = ''\nfor i in range(10):\n    password += random.choice(symbols)\nprint(f'Твой новый пароль: {password}')",
        timer: "import time\nprint('Запуск ракеты...')\nfor i in range(5, 0, -1):\n    print(i)\n    # time.sleep в браузере работает специфично, но цикл пройдет\nprint('ПОЕХАЛИ! 🚀')"
    };

    const helpData = {
        vars: { title: "📦 Переменные", body: "Это имена для данных. Представь ярлык на коробке. Пишем имя, ставим '=' и кладем значение. <br><b>Пример:</b> <code>x = 10</code>" },
        if: { title: "🛤 Условия", body: "Проверяют 'правда' или 'ложь'. <br><b>Важно:</b> Не забывай двоеточие <code>:</code> в конце строки и 4 пробела в начале следующей!" },
        loops: { title: "🔄 Циклы", body: "Повторяют код. <code>range(5)</code> заставит код сработать 5 раз. Очень полезно для списков и очередей." }
    };

    function loadProject(n) { document.getElementById('code-input').value = projects[n]; saveCode(); }
    function showHelp(k) { 
        document.getElementById('modal-title').innerText = helpData[k].title;
        document.getElementById('modal-body').innerHTML = helpData[k].body;
        document.getElementById('modal').style.display = "block";
    }
    function closeHelp() { document.getElementById('modal').style.display = "none"; }
    function copyCode(e) { document.getElementById('code-input').value += "\n" + e.innerText; saveCode(); }
    
    function saveCode() {
        localStorage.setItem('py_code', document.getElementById('code-input').value);
        document.getElementById('save-status').innerText = "Сохранено в " + new Date().toLocaleTimeString();
    }

    function clearAll() { if(confirm("Удалить код?")) { document.getElementById('code-input').value = ""; saveCode(); } }

    function downloadCode() {
        const text = document.getElementById('code-input').value;
        const blob = new Blob([text], { type: 'text/plain' });
        const anchor = document.createElement('a');
        anchor.download = "my_script.py";
        anchor.href = (window.webkitURL || window.URL).createObjectURL(blob);
        anchor.click();
    }

    window.onload = () => {
        const saved = localStorage.getItem('py_code');
        if(saved) document.getElementById('code-input').value = saved;
    }
</script>

<script type="py">
    import sys
    from js import document
    def run_python(event):
        out = document.getElementById("output")
        out.innerText = ""
        code = document.getElementById("code-input").value
        class Writer:
            def write(self, t): out.innerText += t
            def flush(self): pass
        sys.stdout = Writer()
        try: exec(code)
        except Exception as e: out.innerText += f"\n[!] Ошибка: {e}"
</script>
</body>
</html>
