<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Python Academy Studio Pro</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #161b22; padding: 15px 25px; border-bottom: 2px solid #005cc5; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Левая панель */
        .sidebar { width: 350px; background: #0d1117; border-right: 1px solid #30363d; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        .nav-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; transition: all 0.2s ease; }
        .nav-card:hover { border-color: #005cc5; background: #1c2128; }
        
        .nav-header { display: flex; align-items: center; margin-bottom: 12px; font-size: 16px; font-weight: 600; }
        .nav-header span { margin-right: 12px; font-size: 20px; width: 24px; text-align: center; }

        /* Кнопка "Подробнее" */
        .btn-info { 
            width: 100%; 
            background: #21262d; 
            color: #58a6ff; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 600; 
            padding: 10px; 
            transition: all 0.3s ease; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
        }
        .btn-info:hover { 
            background: #005cc5; 
            color: white; 
            border-color: #58a6ff; 
            box-shadow: 0 0 12px rgba(0, 92, 197, 0.4); 
            transform: translateY(-2px); 
        }

        /* Редактор */
        .editor-section { flex: 1; display: flex; flex-direction: column; padding: 20px; background: #0d1117; }
        #code-input { flex: 1; background: #010409; color: #d7dae0; font-family: 'Fira Code', 'Consolas', monospace; padding: 20px; border: 1px solid #30363d; border-radius: 12px; font-size: 16px; resize: none; outline: none; line-height: 1.6; }
        
        .action-bar { display: flex; gap: 12px; margin-top: 15px; }
        
        /* Кнопка ЗАПУСТИТЬ */
        #run-btn { flex: 3; background: #005cc5; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; }
        #run-btn:hover { background: #0366d6; transform: scale(1.01); box-shadow: 0 0 12px rgba(0, 92, 197, 0.3); }
        
        .btn-secondary { flex: 1; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-secondary:hover { background: #30363d; color: #58a6ff; }

        /* Окно вывода (Консоль) - Теперь текст СИНИЙ */
        #output { 
            height: 180px; 
            background: #010409; 
            color: #58a6ff; /* Изменено на синий */
            padding: 15px; 
            font-family: monospace; 
            border-radius: 12px; 
            border: 1px solid #30363d; 
            margin-top: 15px; 
            overflow-y: auto; 
            white-space: pre-wrap; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5); 
        }

        /* Модальное окно */
        #modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-box { background: #161b22; margin: 5% auto; padding: 30px; width: 90%; max-width: 550px; border-radius: 20px; border-top: 5px solid #005cc5; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .close { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #8b949e; transition: 0.2s; }
        .close:hover { color: #f85149; }
        
        .example-block { background: #010409; padding: 20px; border-radius: 12px; border: 1px solid #30363d; margin-top: 25px; position: relative; }
        .example-code { color: #d7dae0; font-family: 'Consolas', monospace; white-space: pre; font-size: 14px; display: block; overflow-x: auto; line-height: 1.5; }
        
        .copy-btn { position: absolute; right: 12px; top: -14px; background: #005cc5; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.2s; }
        .copy-btn:hover { background: #0366d6; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="m-title" style="margin-top:0; color:#58a6ff; font-size: 24px;"></h2>
        <div id="m-body" style="font-size: 16px; line-height: 1.6; color: #c9d1d9; margin-bottom: 10px;"></div>
        
        <div class="example-block">
            <button class="copy-btn" onclick="copyExample()">Копировать код</button>
            <div id="m-code" class="example-code"></div>
        </div>
        <p style="font-size: 12px; color: #8b949e; margin-top: 15px; text-align: center;">Вставь скопированный код в редактор справа.</p>
    </div>
</div>

<header>
    <h2 style="margin:0; font-size: 20px; letter-spacing: 1px;">🐍 PYTHON <span style="color: #58a6ff;">ACADEMY</span></h2>
    <div id="status" style="font-size: 12px; color: #8b949e; background: #010409; padding: 6px 15px; border-radius: 20px; border: 1px solid #30363d;">Студия готова</div>
</header>

<div class="main-container">
    <div class="sidebar">
        <script>
            const commands = [
                { id: 'print', icon: '📣', title: 'Вывод текста', color: '#ffca28' },
                { id: 'vars', icon: '📦', title: 'Переменные', color: '#4fc3f7' },
                { id: 'math', icon: '🧮', title: 'Математика', color: '#ff7043' },
                { id: 'if', icon: '🛤', title: 'Условия (if)', color: '#ba68c8' },
                { id: 'lists', icon: '📚', title: 'Списки', color: '#81c784' },
                { id: 'dicts', icon: '📖', title: 'Словари', color: '#fff176' },
                { id: 'for', icon: '🔄', title: 'Цикл For', color: '#4db6ac' },
                { id: 'while', icon: '🔁', title: 'Цикл While', color: '#fb8c00' },
                { id: 'funcs', icon: '⚙️', title: 'Функции', color: '#f06292' },
                { id: 'errors', icon: '⚠️', title: 'Ошибки', color: '#e57373' }
            ];

            document.write(commands.map(cmd => `
                <div class="nav-card">
                    <div class="nav-header"><span style="color: ${cmd.color}">${cmd.icon}</span> ${cmd.title}</div>
                    <button class="btn-info" onclick="openHelp('${cmd.id}')">
                        <span>🔍</span> Подробнее
                    </button>
                </div>
            `).join(''));
        </script>
        
        <button class="btn-secondary" style="width:100%; margin-top:10px; color:#f85149; padding: 12px; font-weight: bold; border-color: #f8514933;" onclick="clearEditor()">ОЧИСТИТЬ ВСЁ</button>
    </div>

    <div class="editor-section">
        <textarea id="code-input" spellcheck="false" oninput="save()" placeholder="Напиши код здесь..."></textarea>
        <div class="action-bar">
            <button id="run-btn" py-click="run">ЗАПУСТИТЬ КОД ▶</button>
            <button class="btn-secondary" onclick="download()">СКАЧАТЬ .PY</button>
        </div>
        <div id="output">Результат программы появится здесь...</div>
    </div>
</div>

<script>
    const explanations = {
        print: { title: "Вывод данных", desc: "print() выводит текст или числа в консоль.", code: 'print("Привет!")' },
        vars: { title: "Переменные", desc: "Контейнеры для хранения данных.", code: 'x = 10\nprint(x)' },
        math: { title: "Математика", desc: "Сложение, вычитание и другие операции.", code: 'print(5 * 5)' },
        if: { title: "Условия", desc: "Проверка логики (истина/ложь).", code: 'if 5 > 2:\n    print("Да!")' },
        lists: { title: "Списки", desc: "Коллекции элементов в одной переменной.", code: 'items = [1, 2, 3]\nprint(items)' },
        dicts: { title: "Словари", desc: "Данные в формате Ключ: Значение.", code: 'user = {"name": "Alex"}\nprint(user["name"])' },
        for: { title: "Цикл For", desc: "Перебор элементов коллекции.", code: 'for i in range(3):\n    print(i)' },
        while: { title: "Цикл While", desc: "Работает, пока условие истинно.", code: 'i = 0\nwhile i < 3:\n    print(i)\n    i += 1' },
        funcs: { title: "Функции", desc: "Именованные блоки кода.", code: 'def hello():\n    print("Привет!")\n\nhello()' },
        errors: { title: "Ошибки", desc: "Обработка исключительных ситуаций.", code: 'try:\n    1/0\nexcept:\n    print("Ошибка!")' }
    };

    let currentExample = "";

    function openHelp(key) {
        const info = explanations[key];
        document.getElementById('m-title').innerText = info.title;
        document.getElementById('m-body').innerText = info.desc;
        document.getElementById('m-code').innerText = info.code;
        currentExample = info.code;
        document.getElementById('modal').style.display = "block";
    }

    function closeModal() { document.getElementById('modal').style.display = "none"; }
    
    function copyExample() {
        navigator.clipboard.writeText(currentExample);
        const btn = document.querySelector('.copy-btn');
        btn.innerText = "Скопировано! ✅";
        setTimeout(() => { btn.innerText = "Копировать код"; }, 1500);
    }

    function save() { localStorage.setItem('py_studio_final_blue', document.getElementById('code-input').value); }
    function clearEditor() { if(confirm("Стереть всё?")) { document.getElementById('code-input').value = ""; save(); } }
    
    function download() {
        const blob = new Blob([document.getElementById('code-input').value], { type: 'text/plain' });
        const a = document.createElement('a');
        a.download = "main.py";
        a.href = URL.createObjectURL(blob);
        a.click();
    }

    window.onload = () => {
        const saved = localStorage.getItem('py_studio_final_blue');
        if(saved) document.getElementById('code-input').value = saved;
    }
</script>

<script type="py">
    import sys
    import io
    from js import document

    def run(event):
        out_div = document.getElementById("output")
        code = document.getElementById("code-input").value
        out_div.innerText = ""
        
        output_buffer = io.StringIO()
        sys.stdout = output_buffer
        sys.stderr = output_buffer
        
        try:
            exec(code)
            result = output_buffer.getvalue()
            out_div.innerText = result if result else "Код выполнен успешно."
        except Exception as e:
            out_div.innerText = f"❌ ОШИБКА:\n{str(e)}"
        finally:
            sys.stdout = sys.__stdout__
            sys.stderr = sys.__stderr__
</script>
</body>
</html>
